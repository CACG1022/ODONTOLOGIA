<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Configuración RIPS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --bg:#f4f6f9;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#1f2937;
  --muted:#6b7280;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:50px auto;
  padding:20px;
}

h1{
  font-size:28px;
  margin-bottom:8px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:30px;
}

.card{
  background:var(--card);
  border-radius:14px;
  padding:30px;
  box-shadow:0 8px 24px rgba(0,0,0,0.05);
  border:1px solid var(--border);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field.full{
  grid-column:1/-1;
}

label{
  font-weight:600;
  margin-bottom:6px;
  font-size:14px;
}

select,input{
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:14px;
}

select:focus,input:focus{
  outline:none;
  border-color:var(--primary);
}

button{
  margin-top:25px;
  padding:14px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.9;
}

.message{
  margin-top:15px;
  font-size:14px;
}

.success{ color:#15803d; }
.error{ color:#b91c1c; }

.footer-card{
  margin-top:30px;
  padding:20px;
  background:white;
  border-radius:12px;
  border:1px solid var(--border);
}
</style>
</head>
<body>

<div class="container">

  <h1>Configuración RIPS</h1>
  <div class="subtitle">
    Configura la relación entre procedimiento, servicio habilitado y finalidad.
  </div>

  <div class="card">

    <div class="grid">

      <div class="field">
        <label>Sede</label>
        <select id="sedeSelect">
          <option value="">Cargando sedes...</option>
        </select>
      </div>

      <div class="field">
        <label>Activo</label>
        <select id="activo">
          <option value="true" selected>Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>

      <div class="field full">
        <label>Procedimiento</label>
        <select id="procedimiento"></select>
      </div>

      <div class="field full">
        <label>Servicio habilitado (según sede)</label>
        <select id="servicio"></select>
      </div>

      <div class="field full">
        <label>Finalidad tecnología</label>
        <select id="finalidad"></select>
      </div>

    </div>

    <button id="guardarBtn">Guardar configuración</button>

    <div id="msg" class="message"></div>

  </div>

  <div class="footer-card">
    <strong>Tips:</strong>
    <ul>
      <li>Si no aparecen servicios, revisa que la sede tenga servicios habilitados.</li>
      <li>Si hay error de permisos, revisa RLS en Supabase.</li>
    </ul>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://dmcfrmpqlkrqbpjhrfyo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const sedeSelect = document.getElementById("sedeSelect");
const procedimientoSelect = document.getElementById("procedimiento");
const servicioSelect = document.getElementById("servicio");
const finalidadSelect = document.getElementById("finalidad");
const activoSelect = document.getElementById("activo");
const guardarBtn = document.getElementById("guardarBtn");
const msg = document.getElementById("msg");

function showMessage(text,type){
  msg.className = "message " + type;
  msg.textContent = text;
}

async function cargarSedes(){
  const {data,error} = await supabase
    .from("sedes")
    .select("id,nombre")
    .eq("activo",true)
    .order("nombre",{ascending:true});

  if(error){
    showMessage("Error cargando sedes: "+error.message,"error");
    return;
  }

  sedeSelect.innerHTML='<option value="">Seleccione una sede</option>';
  data.forEach(s=>{
    const opt=document.createElement("option");
    opt.value=s.id;
    opt.textContent=s.nombre;
    sedeSelect.appendChild(opt);
  });
}

async function cargarProcedimientos(){
  const {data,error} = await supabase
    .from("procedimientos_precios")
    .select("id,procedimiento")
    .eq("activo",true)
    .order("procedimiento",{ascending:true});

  procedimientoSelect.innerHTML='<option value="">Seleccione procedimiento</option>';
  data.forEach(p=>{
    const opt=document.createElement("option");
    opt.value=p.id;
    opt.textContent=p.procedimiento;
    procedimientoSelect.appendChild(opt);
  });
}

async function cargarFinalidades(){
  const {data} = await supabase
    .from("finalidad_tecnologia")
    .select("codigo,descripcion")
    .eq("activo",true)
    .order("codigo");

  finalidadSelect.innerHTML='<option value="">Seleccione finalidad</option>';
  data.forEach(f=>{
    const opt=document.createElement("option");
    opt.value=f.codigo;
    opt.textContent=f.codigo+" - "+f.descripcion;
    finalidadSelect.appendChild(opt);
  });
}

async function cargarServicios(sedeId){
  servicioSelect.innerHTML='<option value="">Cargando servicios...</option>';

  const {data,error} = await supabase
    .from("servicios_habilitados_sede")
    .select("id,nombre_servicio,cod_servicio")
    .eq("sede_id",sedeId)
    .eq("activo",true)
    .order("cod_servicio");

  if(error){
    showMessage(error.message,"error");
    return;
  }

  servicioSelect.innerHTML='<option value="">Seleccione servicio</option>';
  data.forEach(s=>{
    const opt=document.createElement("option");
    opt.value=s.id;
    opt.textContent=s.cod_servicio+" - "+s.nombre_servicio;
    servicioSelect.appendChild(opt);
  });
}

sedeSelect.addEventListener("change",()=>{
  const sedeId=sedeSelect.value;
  if(sedeId) cargarServicios(sedeId);
});

guardarBtn.addEventListener("click",async ()=>{
  const payload={
    procedimiento_id: Number(procedimientoSelect.value),
    servicio_habilitado_id: servicioSelect.value,
    finalidad_codigo: Number(finalidadSelect.value),
    activo: activoSelect.value==="true"
  };

  const {data,error} = await supabase
    .from("procedimiento_configuracion_rips")
    .insert(payload)
    .select()
    .single();

  if(error){
    showMessage("Error: "+error.message,"error");
  }else{
    showMessage("Configuración guardada correctamente","success");
  }
});

cargarSedes();
cargarProcedimientos();
cargarFinalidades();
</script>

</body>
</html>
