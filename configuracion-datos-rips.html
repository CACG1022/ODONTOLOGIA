<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Configuración RIPS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --danger:#dc2626;
  --success:#16a34a;
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#e5e7eb;
}

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--bg);
}

.container{
  max-width:1200px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:12px;
  padding:25px;
  border:1px solid var(--border);
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.field{display:flex;flex-direction:column;}

label{font-weight:600;margin-bottom:6px;}

select{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
}

button{
  margin-top:20px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.btn-primary{ background:var(--primary); color:white; }
.btn-danger{ background:var(--danger); color:white; }
.btn-success{ background:var(--success); color:white; }

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
}

th{
  background:#f9fafb;
  text-align:left;
}

.action-btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  margin-right:5px;
}
</style>
</head>
<body>

<div class="container">

<h2>Configuración RIPS</h2>

<div class="card">
<div class="grid">

<div class="field">
<label>Sede</label>
<select id="sedeSelect"></select>
</div>

<div class="field">
<label>Procedimiento</label>
<select id="procedimiento"></select>
</div>

<div class="field">
<label>Servicio</label>
<select id="servicio" disabled></select>
</div>

<div class="field">
<label>Finalidad</label>
<select id="finalidad"></select>
</div>

</div>

<button id="guardarBtn" class="btn-primary">Guardar configuración</button>

</div>

<div class="card">
<h3>Procedimientos configurados</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>CUPS</th>
<th>Procedimiento</th>
<th>Servicio</th>
<th>Finalidad</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaConfigurados"></tbody>
</table>
</div>

<div class="card">
<h3>Procedimientos pendientes</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Procedimiento</th>
</tr>
</thead>
<tbody id="tablaPendientes"></tbody>
</table>
</div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://dmcfrmpqlkrqbpjhrfyo.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE"
);

let procedimientosPendientesGlobal=[];

const sedeSelect=document.getElementById("sedeSelect");
const procedimientoSelect=document.getElementById("procedimiento");
const servicioSelect=document.getElementById("servicio");
const finalidadSelect=document.getElementById("finalidad");
const tablaConfigurados=document.getElementById("tablaConfigurados");
const tablaPendientes=document.getElementById("tablaPendientes");

async function cargarSedes(){
  const {data}=await supabase.from("sedes").select("id,nombre").eq("activo",true);
  sedeSelect.innerHTML='<option value="">Seleccione sede</option>';
  data.forEach(s=>{
    sedeSelect.innerHTML+=`<option value="${s.id}">${s.nombre}</option>`;
  });
}

async function cargarServicios(sedeId){
  servicioSelect.disabled=false;
  const {data}=await supabase
  .from("servicios_habilitados_sede")
  .select("id,nombre_servicio,cod_servicio")
  .eq("sede_id",sedeId)
  .eq("activo",true);

  servicioSelect.innerHTML='<option value="">Seleccione servicio</option>';
  data.forEach(s=>{
    servicioSelect.innerHTML+=`<option value="${s.id}">${s.cod_servicio} - ${s.nombre_servicio}</option>`;
  });
}

async function cargarFinalidades(){
  const {data}=await supabase.from("finalidad_tecnologia")
  .select("codigo,descripcion")
  .eq("activo",true);

  finalidadSelect.innerHTML='<option value="">Seleccione finalidad</option>';
  data.forEach(f=>{
    finalidadSelect.innerHTML+=`<option value="${f.codigo}">${f.descripcion}</option>`;
  });
}

async function cargarPendientesYSelect(){
  const {data:procedimientos}=await supabase
  .from("procedimientos_precios")
  .select("id,procedimiento")
  .eq("activo",true);

  const {data:configurados}=await supabase
  .from("procedimiento_configuracion_rips")
  .select("procedimiento_id");

  const ids=configurados.map(c=>c.procedimiento_id);
  procedimientosPendientesGlobal=procedimientos.filter(p=>!ids.includes(p.id));

  // Tabla pendientes
  tablaPendientes.innerHTML="";
  procedimientosPendientesGlobal.forEach(p=>{
    tablaPendientes.innerHTML+=`
      <tr><td>${p.id}</td><td>${p.procedimiento}</td></tr>
    `;
  });

  // Select procedimiento
  procedimientoSelect.innerHTML='<option value="">Seleccione procedimiento</option>';
  procedimientosPendientesGlobal.forEach(p=>{
    procedimientoSelect.innerHTML+=`
      <option value="${p.id}">${p.procedimiento}</option>
    `;
  });
}

async function cargarConfigurados(){
  const {data}=await supabase
  .from("procedimiento_configuracion_rips")
  .select(`
    id,
    procedimiento_id,
    procedimientos_precios(id,procedimiento,codigo_cups),
    servicios_habilitados_sede(nombre_servicio,cod_servicio),
    finalidad_tecnologia(descripcion)
  `);

  tablaConfigurados.innerHTML="";
  data.forEach(c=>{
    tablaConfigurados.innerHTML+=`
    <tr>
      <td>${c.procedimientos_precios.id}</td>
      <td>${c.procedimientos_precios.codigo_cups ?? '-'}</td>
      <td>${c.procedimientos_precios.procedimiento}</td>
      <td>${c.servicios_habilitados_sede.cod_servicio} - ${c.servicios_habilitados_sede.nombre_servicio}</td>
      <td>${c.finalidad_tecnologia.descripcion}</td>
      <td>
        <button class="action-btn btn-danger"
          onclick="eliminar('${c.id}')">
          Eliminar
        </button>
      </td>
    </tr>
    `;
  });
}

window.eliminar=async(id)=>{
  if(!confirm("¿Seguro que desea eliminar esta configuración?")) return;

  await supabase
  .from("procedimiento_configuracion_rips")
  .delete()
  .eq("id",id);

  await cargarConfigurados();
  await cargarPendientesYSelect();
}

document.getElementById("guardarBtn").onclick=async()=>{
  const payload={
    procedimiento_id:Number(procedimientoSelect.value),
    servicio_habilitado_id:servicioSelect.value,
    finalidad_codigo:Number(finalidadSelect.value)
  };

  await supabase.from("procedimiento_configuracion_rips").insert(payload);

  await cargarConfigurados();
  await cargarPendientesYSelect();
}

sedeSelect.addEventListener("change",()=>{
  if(sedeSelect.value) cargarServicios(sedeSelect.value);
});

cargarSedes();
cargarFinalidades();
cargarConfigurados();
cargarPendientesYSelect();
</script>

</body>
</html>
