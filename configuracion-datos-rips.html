<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Configuración RIPS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --bg:#f4f6f9;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#1f2937;
  --muted:#6b7280;
}

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:40px auto;
  padding:20px;
}

h1{margin-bottom:5px;}
.subtitle{color:var(--muted);margin-bottom:25px;}

.card{
  background:var(--card);
  border-radius:12px;
  padding:25px;
  border:1px solid var(--border);
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.field{display:flex;flex-direction:column;}
.field.full{grid-column:1/-1;}

label{font-weight:600;font-size:14px;margin-bottom:5px;}

select,input{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
}

button{
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button.secondary{
  background:#6b7280;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
}

th{
  background:#f9fafb;
  text-align:left;
}

.action-btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  background:#10b981;
  color:white;
}

.section-title{
  font-weight:600;
  margin-bottom:15px;
}
.message{margin-top:10px;}
.success{color:#15803d;}
.error{color:#b91c1c;}
</style>
</head>
<body>

<div class="container">

<h1>Configuración RIPS</h1>
<div class="subtitle">Administra configuración de procedimientos</div>

<div class="card">
<div class="grid">

<div class="field">
<label>Sede</label>
<select id="sedeSelect"></select>
</div>

<div class="field">
<label>Procedimiento</label>
<select id="procedimiento"></select>
</div>

<div class="field">
<label>Servicio</label>
<select id="servicio"></select>
</div>

<div class="field">
<label>Finalidad</label>
<select id="finalidad"></select>
</div>

</div>

<button id="guardarBtn">Guardar configuración</button>
<button id="cancelarBtn" class="secondary" style="display:none;">Cancelar edición</button>

<div id="msg" class="message"></div>
</div>

<!-- CONFIGURADOS -->
<div class="card">
<div class="section-title">Procedimientos configurados</div>
<table>
<thead>
<tr>
<th>Procedimiento</th>
<th>Servicio</th>
<th>Finalidad</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaConfigurados"></tbody>
</table>
</div>

<!-- PENDIENTES -->
<div class="card">
<div class="section-title">Procedimientos pendientes</div>
<table>
<thead>
<tr>
<th>ID</th>
<th>Procedimiento</th>
</tr>
</thead>
<tbody id="tablaPendientes"></tbody>
</table>
</div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase=createClient(
"https://dmcfrmpqlkrqbpjhrfyo.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE"
);

let editandoId=null;

const sedeSelect=document.getElementById("sedeSelect");
const procedimientoSelect=document.getElementById("procedimiento");
const servicioSelect=document.getElementById("servicio");
const finalidadSelect=document.getElementById("finalidad");
const guardarBtn=document.getElementById("guardarBtn");
const cancelarBtn=document.getElementById("cancelarBtn");
const msg=document.getElementById("msg");
const tablaPendientes=document.getElementById("tablaPendientes");
const tablaConfigurados=document.getElementById("tablaConfigurados");

function showMessage(text,type){
  msg.className="message "+type;
  msg.textContent=text;
}

async function cargarTodo(){
  await cargarSedes();
  await cargarProcedimientos();
  await cargarFinalidades();
  await cargarConfigurados();
  await cargarPendientes();
}

async function cargarSedes(){
  const {data}=await supabase.from("sedes").select("id,nombre").eq("activo",true);
  sedeSelect.innerHTML='<option value="">Seleccione sede</option>';
  data.forEach(s=>{
    sedeSelect.innerHTML+=`<option value="${s.id}">${s.nombre}</option>`;
  });
}

async function cargarProcedimientos(){
  const {data}=await supabase.from("procedimientos_precios").select("id,procedimiento").eq("activo",true);
  procedimientoSelect.innerHTML='<option value="">Seleccione procedimiento</option>';
  data.forEach(p=>{
    procedimientoSelect.innerHTML+=`<option value="${p.id}">${p.procedimiento}</option>`;
  });
}

async function cargarFinalidades(){
  const {data}=await supabase.from("finalidad_tecnologia").select("codigo,descripcion").eq("activo",true);
  finalidadSelect.innerHTML='<option value="">Seleccione finalidad</option>';
  data.forEach(f=>{
    finalidadSelect.innerHTML+=`<option value="${f.codigo}">${f.codigo} - ${f.descripcion}</option>`;
  });
}

async function cargarServicios(sedeId){
  const {data}=await supabase
  .from("servicios_habilitados_sede")
  .select("id,nombre_servicio,cod_servicio")
  .eq("sede_id",sedeId)
  .eq("activo",true);

  servicioSelect.innerHTML='<option value="">Seleccione servicio</option>';
  data.forEach(s=>{
    servicioSelect.innerHTML+=`<option value="${s.id}">${s.cod_servicio} - ${s.nombre_servicio}</option>`;
  });
}

async function cargarConfigurados(){
  const {data}=await supabase
  .from("procedimiento_configuracion_rips")
  .select(`
    id,
    procedimiento_id,
    finalidad_codigo,
    servicio_habilitado_id,
    procedimientos_precios(procedimiento),
    servicios_habilitados_sede(nombre_servicio,cod_servicio),
    finalidad_tecnologia(descripcion)
  `);

  tablaConfigurados.innerHTML="";
  data.forEach(c=>{
    tablaConfigurados.innerHTML+=`
    <tr>
      <td>${c.procedimientos_precios.procedimiento}</td>
      <td>${c.servicios_habilitados_sede.cod_servicio} - ${c.servicios_habilitados_sede.nombre_servicio}</td>
      <td>${c.finalidad_tecnologia.descripcion}</td>
      <td>
        <button class="action-btn" onclick="editar('${c.id}','${c.procedimiento_id}','${c.servicio_habilitado_id}','${c.finalidad_codigo}')">
        Editar
        </button>
      </td>
    </tr>
    `;
  });
}

async function cargarPendientes(){
  const {data:procedimientos}=await supabase.from("procedimientos_precios").select("id,procedimiento").eq("activo",true);
  const {data:configurados}=await supabase.from("procedimiento_configuracion_rips").select("procedimiento_id");
  const ids=configurados.map(c=>c.procedimiento_id);
  const pendientes=procedimientos.filter(p=>!ids.includes(p.id));
  tablaPendientes.innerHTML="";
  pendientes.forEach(p=>{
    tablaPendientes.innerHTML+=`<tr><td>${p.id}</td><td>${p.procedimiento}</td></tr>`;
  });
}

window.editar=(id,procId,servId,finId)=>{
  editandoId=id;
  procedimientoSelect.value=procId;
  servicioSelect.value=servId;
  finalidadSelect.value=finId;
  guardarBtn.textContent="Actualizar configuración";
  cancelarBtn.style.display="inline-block";
}

cancelarBtn.onclick=()=>{
  editandoId=null;
  guardarBtn.textContent="Guardar configuración";
  cancelarBtn.style.display="none";
}

guardarBtn.onclick=async ()=>{
  const payload={
    procedimiento_id:Number(procedimientoSelect.value),
    servicio_habilitado_id:servicioSelect.value,
    finalidad_codigo:Number(finalidadSelect.value)
  };

  if(editandoId){
    await supabase.from("procedimiento_configuracion_rips")
    .update(payload)
    .eq("id",editandoId);
    showMessage("Actualizado correctamente","success");
  }else{
    await supabase.from("procedimiento_configuracion_rips")
    .insert(payload);
    showMessage("Guardado correctamente","success");
  }

  editandoId=null;
  guardarBtn.textContent="Guardar configuración";
  cancelarBtn.style.display="none";
  cargarConfigurados();
  cargarPendientes();
}

sedeSelect.addEventListener("change",()=>{
  if(sedeSelect.value) cargarServicios(sedeSelect.value);
});

cargarTodo();
</script>

</body>
</html>
