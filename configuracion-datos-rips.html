<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Configuración RIPS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --bg:#f4f6f9;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#1f2937;
  --muted:#6b7280;
}

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1000px;
  margin:50px auto;
  padding:20px;
}

h1{font-size:28px;margin-bottom:5px;}
.subtitle{color:var(--muted);margin-bottom:30px;}

.card{
  background:var(--card);
  border-radius:14px;
  padding:30px;
  box-shadow:0 8px 24px rgba(0,0,0,0.05);
  border:1px solid var(--border);
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.field{display:flex;flex-direction:column;}
.field.full{grid-column:1/-1;}

label{font-weight:600;margin-bottom:6px;font-size:14px;}

select,input{
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:14px;
}

select:focus,input:focus{
  outline:none;
  border-color:var(--primary);
}

button{
  margin-top:25px;
  padding:14px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{opacity:.9;}

.message{margin-top:15px;font-size:14px;}
.success{color:#15803d;}
.error{color:#b91c1c;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  padding:12px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

th{
  background:#f9fafb;
  font-weight:600;
}
</style>
</head>
<body>

<div class="container">

<h1>Configuración RIPS</h1>
<div class="subtitle">Configura procedimiento → servicio → finalidad</div>

<div class="card">
<div class="grid">

<div class="field">
<label>Sede</label>
<select id="sedeSelect"></select>
</div>

<div class="field">
<label>Activo</label>
<select id="activo">
<option value="true">Activo</option>
<option value="false">Inactivo</option>
</select>
</div>

<div class="field full">
<label>Procedimiento</label>
<select id="procedimiento"></select>
</div>

<div class="field full">
<label>Servicio habilitado</label>
<select id="servicio"></select>
</div>

<div class="field full">
<label>Finalidad tecnología</label>
<select id="finalidad"></select>
</div>

</div>

<button id="guardarBtn">Guardar configuración</button>
<div id="msg" class="message"></div>
</div>

<!-- TABLA DE PROCEDIMIENTOS PENDIENTES -->
<div class="card">
<h2>Procedimientos pendientes de configuración</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Procedimiento</th>
</tr>
</thead>
<tbody id="tablaPendientes"></tbody>
</table>
</div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL="https://dmcfrmpqlkrqbpjhrfyo.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE";

const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const sedeSelect=document.getElementById("sedeSelect");
const procedimientoSelect=document.getElementById("procedimiento");
const servicioSelect=document.getElementById("servicio");
const finalidadSelect=document.getElementById("finalidad");
const guardarBtn=document.getElementById("guardarBtn");
const msg=document.getElementById("msg");
const tablaPendientes=document.getElementById("tablaPendientes");

function showMessage(text,type){
  msg.className="message "+type;
  msg.textContent=text;
}

async function cargarSedes(){
  const {data}=await supabase.from("sedes").select("id,nombre").eq("activo",true);
  sedeSelect.innerHTML='<option value="">Seleccione sede</option>';
  data.forEach(s=>{
    sedeSelect.innerHTML+=`<option value="${s.id}">${s.nombre}</option>`;
  });
}

async function cargarProcedimientos(){
  const {data}=await supabase.from("procedimientos_precios").select("id,procedimiento").eq("activo",true);
  procedimientoSelect.innerHTML='<option value="">Seleccione procedimiento</option>';
  data.forEach(p=>{
    procedimientoSelect.innerHTML+=`<option value="${p.id}">${p.procedimiento}</option>`;
  });
}

async function cargarFinalidades(){
  const {data}=await supabase.from("finalidad_tecnologia").select("codigo,descripcion").eq("activo",true);
  finalidadSelect.innerHTML='<option value="">Seleccione finalidad</option>';
  data.forEach(f=>{
    finalidadSelect.innerHTML+=`<option value="${f.codigo}">${f.codigo} - ${f.descripcion}</option>`;
  });
}

async function cargarServicios(sedeId){
  const {data}=await supabase
  .from("servicios_habilitados_sede")
  .select("id,nombre_servicio,cod_servicio")
  .eq("sede_id",sedeId)
  .eq("activo",true);

  servicioSelect.innerHTML='<option value="">Seleccione servicio</option>';
  data.forEach(s=>{
    servicioSelect.innerHTML+=`<option value="${s.id}">${s.cod_servicio} - ${s.nombre_servicio}</option>`;
  });
}

async function cargarPendientes(){
  const {data:procedimientos}=await supabase
    .from("procedimientos_precios")
    .select("id,procedimiento")
    .eq("activo",true);

  const {data:configurados}=await supabase
    .from("procedimiento_configuracion_rips")
    .select("procedimiento_id");

  const idsConfigurados=configurados.map(c=>c.procedimiento_id);

  const pendientes=procedimientos.filter(p=>!idsConfigurados.includes(p.id));

  tablaPendientes.innerHTML="";
  pendientes.forEach(p=>{
    tablaPendientes.innerHTML+=`
      <tr>
        <td>${p.id}</td>
        <td>${p.procedimiento}</td>
      </tr>
    `;
  });
}

guardarBtn.addEventListener("click",async ()=>{
  const payload={
    procedimiento_id:Number(procedimientoSelect.value),
    servicio_habilitado_id:servicioSelect.value,
    finalidad_codigo:Number(finalidadSelect.value),
    activo:true
  };

  const {error}=await supabase
    .from("procedimiento_configuracion_rips")
    .insert(payload);

  if(error){
    showMessage(error.message,"error");
  }else{
    showMessage("Configuración guardada","success");
    cargarPendientes(); // actualizar tabla
  }
});

sedeSelect.addEventListener("change",()=>{
  if(sedeSelect.value) cargarServicios(sedeSelect.value);
});

cargarSedes();
cargarProcedimientos();
cargarFinalidades();
cargarPendientes();
</script>

</body>
</html>
