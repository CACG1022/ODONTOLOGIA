<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor de Archivos Clínicos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
margin:0;
background:white;
color:#1f2a37;
}

/* HEADER */

header{
background:#0f2a44;
color:white;
padding:22px 40px;
font-size:22px;
font-weight:600;
letter-spacing:.3px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

/* CONTENEDOR */

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

/* BUSCADOR */

.search{
display:flex;
gap:12px;
margin-bottom:50px;
align-items:center;
}

.search input{
padding:14px 16px;
font-size:15px;
border-radius:10px;
border:1px solid #d9e2ec;
width:260px;
transition:.2s;
}

.search input:focus{
outline:none;
border-color:#1b3d5a;
box-shadow:0 0 0 3px rgba(27,61,90,0.1);
}

.search button{
background:#0f2a44;
color:white;
border:none;
padding:13px 26px;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

.search button:hover{
background:#163a5c;
}

/* SECCIONES */

.section{
margin-bottom:60px;
}

.section h2{
font-size:20px;
margin-bottom:20px;
color:#0f2a44;
font-weight:600;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:25px;
}

/* TARJETAS */

.card{

background:rgba(255,255,255,0.65);

backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);

border:1px solid rgba(0,0,0,0.06);

border-radius:14px;

padding:20px;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

transition:.25s;

}

.card:hover{

transform:translateY(-4px);

box-shadow:0 15px 35px rgba(0,0,0,0.12);

}

/* IMAGEN */

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* NOMBRE ARCHIVO */

.file{
font-size:14px;
margin-top:5px;
font-weight:500;
color:#1f2a37;
}

/* BOTONES */

a.download{

display:inline-block;

margin-top:10px;

color:#0f2a44;

font-weight:600;

font-size:14px;

cursor:pointer;

text-decoration:none;

}

a.download:hover{
text-decoration:underline;
}

/* PDF / DOC */

.pdf{
text-align:center;
}

.pdf-icon{
font-size:38px;
margin-bottom:10px;
}

/* LOADING */

.loading{
opacity:.6;
font-style:italic;
}

</style>
</head>


<body>

<header>
Visor de Archivos Clínicos
</header>


<div class="container">

<div class="search">

<input id="doc" placeholder="Documento del paciente">

<button onclick="buscar()">Buscar</button>

</div>


<div class="section">
<h2>Radiografías</h2>
<div id="radiografias" class="grid"></div>
</div>


<div class="section">
<h2>Fotografías</h2>
<div id="fotografias" class="grid"></div>
</div>


<div class="section">
<h2>Documentos</h2>
<div id="documentos" class="grid"></div>
</div>

</div>



<script>

const webhookBusqueda="https://ftth-n8n2.pzveh5.easypanel.host/webhook/9f914119-dfaf-4eff-b865-949c197af162"

const webhookDescarga="https://ftth-n8n2.pzveh5.easypanel.host/webhook/33fa344c-9ef2-4203-9562-36594c1233f3"



async function buscar(){

const doc=document.getElementById("doc").value

if(!doc){

alert("Ingrese documento del paciente")
return

}

document.getElementById("radiografias").innerHTML='<div class="loading">Cargando...</div>'
document.getElementById("fotografias").innerHTML='<div class="loading">Cargando...</div>'
document.getElementById("documentos").innerHTML='<div class="loading">Cargando...</div>'


try{

const res=await fetch(`${webhookBusqueda}?documento=${doc}`)
const data=await res.json()

mostrar("radiografias",data.radiografias)
mostrar("fotografias",data.fotografias)
mostrar("documentos",data.documentos)

}catch(e){

console.error(e)
alert("Error consultando archivos")

}

}



function descargar(key){

if(!key){

alert("No se encontró la ruta del archivo")
return

}

const url = webhookDescarga + "?key=" + encodeURIComponent(key)

window.open(url,"_blank")

}



function mostrar(tipo,lista){

const cont=document.getElementById(tipo)

if(!lista || lista.length==0){

cont.innerHTML="Sin archivos"
return

}

cont.innerHTML=""

lista.forEach(file=>{

/* IMAGEN */

if(file.nombre.match(/\.(jpg|png|jpeg|webp)$/i)){

cont.innerHTML+=`

<div class="card">

<img src="${file.url}">

<div class="file">${file.nombre}</div>

<a class="download" onclick="descargar('${file.key}')">

Descargar

</a>

</div>

`

}

/* PDF */

else if(file.nombre.match(/\.pdf$/i)){

cont.innerHTML+=`

<div class="card pdf">

<div class="pdf-icon">📄</div>

<div class="file">${file.nombre}</div>

<a class="download" onclick="descargar('${file.key}')">

Descargar PDF

</a>

</div>

`

}

/* OTROS */

else{

cont.innerHTML+=`

<div class="card pdf">

<div class="pdf-icon">📁</div>

<div class="file">${file.nombre}</div>

<a class="download" onclick="descargar('${file.key}')">

Descargar archivo

</a>

</div>

`

}

})

}

</script>

</body>
</html>
