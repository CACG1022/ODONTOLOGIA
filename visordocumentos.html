<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor de Archivos Clínicos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f3f6f9;
margin:0;
}

header{
background:#0D47A1;
color:white;
padding:18px;
font-size:22px;
font-weight:600;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.search{
display:flex;
gap:10px;
margin-bottom:30px;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
width:250px;
}

button{
background:#0D47A1;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

.section{
margin-bottom:40px;
}

.section h2{
margin-bottom:15px;
color:#1f2a37;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
padding:15px;
}

.card img{
width:100%;
border-radius:8px;
}

.file{
font-size:14px;
margin-top:10px;
}

a{
text-decoration:none;
color:#2c6fa3;
font-weight:600;
display:block;
margin-top:6px;
cursor:pointer;
}

.pdf{
background:#f9fafb;
padding:20px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<header>
Visor de Archivos Clínicos
</header>

<div class="container">

<div class="search">
<input id="doc" placeholder="Documento del paciente">
<button onclick="buscar()">Buscar</button>
</div>

<div class="section">
<h2>Radiografías</h2>
<div id="radiografias" class="grid"></div>
</div>

<div class="section">
<h2>Fotografías</h2>
<div id="fotografias" class="grid"></div>
</div>

<div class="section">
<h2>Documentos</h2>
<div id="documentos" class="grid"></div>
</div>

</div>


<script>

const webhookBusqueda="https://ftth-n8n2.pzveh5.easypanel.host/webhook/9f914119-dfaf-4eff-b865-949c197af162"
const webhookDescarga="https://ftth-n8n2.pzveh5.easypanel.host/webhook/33fa344c-9ef2-4203-9562-36594c1233f3"

function obtenerDocumentoURL(){

const params=new URLSearchParams(window.location.search)
const doc=params.get("doc")

if(doc){

document.getElementById("doc").value=doc
buscar()

}

}


async function buscar(){

const doc=document.getElementById("doc").value

if(!doc){
alert("Ingrese documento")
return
}

document.getElementById("radiografias").innerHTML="Cargando..."
document.getElementById("fotografias").innerHTML="Cargando..."
document.getElementById("documentos").innerHTML="Cargando..."

try{

const res=await fetch(`${webhookBusqueda}?documento=${doc}`)
const data=await res.json()

mostrar("radiografias",data.radiografias)
mostrar("fotografias",data.fotografias)
mostrar("documentos",data.documentos)

}catch(e){

console.error(e)
alert("Error consultando archivos")

}

}



function extraerKey(url){

const partes=url.split("/dentova/")

if(partes.length<2) return null

return partes[1]

}



function descargarArchivo(url){

const key=extraerKey(url)

if(!key){
alert("No se pudo obtener la key")
return
}

const link=webhookDescarga+"?key="+encodeURIComponent(key)

window.open(link,"_blank")

}



function mostrar(tipo,lista){

const cont=document.getElementById(tipo)

if(!lista || lista.length==0){

cont.innerHTML="Sin archivos"
return

}

cont.innerHTML=""

lista.forEach(file=>{

let html=""

if(file.nombre.match(/\.(jpg|png|jpeg|webp)$/i)){

html=`
<div class="card">
<img src="${file.url}">
<div class="file">${file.nombre}</div>
<a onclick="descargarArchivo('${file.url}')">Descargar</a>
</div>
`

}

else if(file.nombre.match(/\.pdf$/i)){

html=`
<div class="card pdf">
📄 ${file.nombre}<br><br>
<a onclick="descargarArchivo('${file.url}')">Descargar PDF</a>
</div>
`

}

else{

html=`
<div class="card pdf">
📁 ${file.nombre}<br><br>
<a onclick="descargarArchivo('${file.url}')">Descargar archivo</a>
</div>
`

}

cont.innerHTML+=html

})

}
  window.addEventListener("load",obtenerDocumentoURL)

</script>

</body>
</html>
