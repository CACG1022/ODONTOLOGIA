<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor de Archivos Clínicos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f3f6f9;
margin:0;
}

header{
background:#1f6aa5;
color:white;
padding:20px;
font-size:22px;
font-weight:600;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.search{
display:flex;
gap:10px;
margin-bottom:30px;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
width:250px;
}

button{
background:#1f6aa5;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

.section{
margin-bottom:40px;
}

.section h2{
margin-bottom:15px;
color:#1f2a37;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
padding:15px;
}

.card img{
width:100%;
border-radius:8px;
}

.file{
font-size:14px;
margin-top:10px;
}

a{
text-decoration:none;
color:#1f6aa5;
font-weight:600;
}

.pdf{
background:#f9fafb;
padding:20px;
border-radius:10px;
text-align:center;
}

</style>
</head>


<body>

<header>
Visor de Archivos Clínicos
</header>

<div class="container">

<div class="search">

<input id="doc" placeholder="Documento del paciente">

<button onclick="cargar()">Buscar</button>

</div>


<div class="section">
<h2>Radiografías</h2>
<div id="radiografias" class="grid"></div>
</div>

<div class="section">
<h2>Fotografías</h2>
<div id="fotografias" class="grid"></div>
</div>

<div class="section">
<h2>Documentos</h2>
<div id="documentos" class="grid"></div>
</div>


</div>


<script>

const endpoint="http://31.97.133.62:9000/dentova/pacientes"


async function cargar(){

const doc=document.getElementById("doc").value

if(!doc){
alert("Ingrese documento")
return
}

cargarTipo("radiografias",doc)
cargarTipo("fotografias",doc)
cargarTipo("documentos",doc)

}


async function cargarTipo(tipo,doc){

const cont=document.getElementById(tipo)

cont.innerHTML="Cargando..."

try{

const url=`${endpoint}/${doc}/${tipo}`

const res=await fetch(url)

const text=await res.text()

const parser=new DOMParser()

const xml=parser.parseFromString(text,"text/xml")

const files=xml.querySelectorAll("Key")

cont.innerHTML=""

files.forEach(file=>{

const name=file.textContent.split("/").pop()

const link=`${endpoint}/${file.textContent}`

if(name.match(/\.(jpg|png|jpeg|webp)$/i)){

cont.innerHTML+=`
<div class="card">
<img src="${link}">
<div class="file">${name}</div>
<a href="${link}" target="_blank">Abrir</a>
</div>
`

}

else if(name.match(/\.pdf$/i)){

cont.innerHTML+=`
<div class="card pdf">
📄 ${name}<br><br>
<a href="${link}" target="_blank">Ver documento</a>
</div>
`

}

else{

cont.innerHTML+=`
<div class="card pdf">
📁 ${name}<br><br>
<a href="${link}" target="_blank">Descargar</a>
</div>
`

}

})

}
catch(e){

cont.innerHTML="Sin archivos"

}

}

</script>

</body>
</html>
