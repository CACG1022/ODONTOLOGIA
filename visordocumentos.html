<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor de Archivos Clínicos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:#f3f6f9;
margin:0;
}

header{
background:#073275;
color:white;
padding:18px;
font-size:22px;
font-weight:600;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.search{
display:flex;
gap:10px;
margin-bottom:30px;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
width:250px;
}

button{
background:#24B5A9;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

.section{
margin-bottom:40px;
}

.section h2{
margin-bottom:15px;
color:#1f2a37;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
padding:15px;
}

.card img{
width:100%;
border-radius:8px;
}

.file{
font-size:14px;
margin-top:10px;
}

a{
text-decoration:none;
color:#2c6fa3;
font-weight:600;
display:block;
margin-top:6px;
cursor:pointer;
}

.pdf{
background:#f9fafb;
padding:20px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<header>
Visor de Archivos Clínicos
</header>

<div class="container">

<div class="search">
<input id="doc" placeholder="Documento del paciente">
<button onclick="buscar()">Buscar</button>
</div>

<div class="section">
<h2>Radiografías</h2>
<div id="radiografias" class="grid"></div>
</div>

<div class="section">
<h2>Fotografías</h2>
<div id="fotografias" class="grid"></div>
</div>

<div class="section">
<h2>Documentos</h2>
<div id="documentos" class="grid"></div>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dmcfrmpqlkrqbpjhrfyo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE"
);

/* ================= AUTO BUSCAR ================= */
function obtenerDocumentoURL(){
  const params = new URLSearchParams(window.location.search);
  const doc = params.get("doc");

  if(doc){
    document.getElementById("doc").value = doc;
    buscar();
  }
}

/* ================= BUSCAR ================= */
async function buscar(){

  const doc = document.getElementById("doc").value;

  if(!doc){
    alert("Ingrese documento");
    return;
  }

  document.getElementById("radiografias").innerHTML="Cargando...";
  document.getElementById("fotografias").innerHTML="Cargando...";
  document.getElementById("documentos").innerHTML="Cargando...";

  try{

    const { data: userData } = await supabase.auth.getUser();

    if(!userData?.user){
      alert("No hay sesión activa");
      return;
    }

    const userId = userData.user.id;

    const { data: perfil, error: errorPerfil } = await supabase
      .from("profiles")
      .select("tenant_id")
      .eq("id", userId)
      .single();

    if(errorPerfil){
      console.error(errorPerfil);
      throw errorPerfil;
    }

    const tenant_id = perfil.tenant_id;

    const { data, error } = await supabase
      .from("documentos_adjuntos")
      .select("*")
      .eq("tenant_id", tenant_id)
      .eq("documento_paciente", doc);

    if(error){
      console.error(error);
      throw error;
    }

    console.log("DATA:", data);

    const radiografias = data.filter(d => d.tipo === "radiografias");
    const fotografias = data.filter(d => d.tipo === "fotografias");
    const documentos = data.filter(d => d.tipo === "documentos");

    mostrar("radiografias", radiografias);
    mostrar("fotografias", fotografias);
    mostrar("documentos", documentos);

  }catch(e){

    console.error("ERROR:", e);

    document.getElementById("radiografias").innerHTML="Sin archivos";
    document.getElementById("fotografias").innerHTML="Sin archivos";
    document.getElementById("documentos").innerHTML="Sin archivos";

  }

}

/* ================= MOSTRAR ================= */
function mostrar(tipo, lista){

  const cont = document.getElementById(tipo);

  if(!lista || lista.length === 0){
    cont.innerHTML = "El paciente no posee documentos adjuntos.";
    return;
  }

  cont.innerHTML = "";

  lista.forEach(file => {

    let html = "";

    if(file.nombre_archivo.match(/\.(jpg|png|jpeg|webp)$/i)){

      html = `
      <div class="card">
        <img src="${file.storage_url}">
        <div class="file">${file.nombre_archivo}</div>
        <a href="${file.storage_url}" target="_blank">Descargar</a>
      </div>
      `;

    } else if(file.nombre_archivo.match(/\.pdf$/i)){

      html = `
      <div class="card pdf">
        📄 ${file.nombre_archivo}<br><br>
        <a href="${file.storage_url}" target="_blank">Descargar PDF</a>
      </div>
      `;

    } else {

      html = `
      <div class="card pdf">
        📁 ${file.nombre_archivo}<br><br>
        <a href="${file.storage_url}" target="_blank">Descargar archivo</a>
      </div>
      `;

    }

    cont.innerHTML += html;

  });

}

/* ================= INIT ================= */
window.addEventListener("load", obtenerDocumentoURL);
window.buscar = buscar;

</script>

</body>
</html>
