    async function cargarRolDesdeProfiles(userId) {
      try {
        const { data, error } = await supabase
          .from("profiles")
          .select("role")
          .eq("id", userId)
          .single();

        return data?.role || null;

    // ✅ Convierte input a número o null si está vacío
    function money(v) {
      const raw = String(v ?? "").trim();
      if (!raw) return null;
      const n = parseInt(raw.replace(/[^\d]/g, ""), 10);
      return Number.isFinite(n) ? n : null;
    }

    // ✅ Formato miles (solo visual)
    function formatMiles(v) {
  const raw = String(v ?? "").trim();
  if (!raw) return "";
  const n = parseInt(raw.replace(/[^\d]/g, ""), 10);
  return Number.isFinite(n) ? n.toLocaleString("en-US") : "";
}


    function unformatMiles(v) {
      return String(v ?? "").replace(/[^\d]/g, "");
    }

    function normalizeName(s){
      return String(s || "").trim();
    }

async function validarCUPS(codigo){
  const cups = String(codigo ?? "").trim();

  if(!cups) return false;

  const { data, error } = await supabase
    .from("CUPS")
    .select("codigo")
    .eq("codigo", cups)
    .limit(1); // 🔥 quitamos single()

  if(error){
    console.error("Error validando CUPS:", error);
    return false;
  }

  return data && data.length > 0;
}

    function applyFilter(){
  const q = String(document.getElementById("search").value || "")
    .trim()
    .toLowerCase();

  const fProf = document.getElementById("filter-profesional")?.value || "";
  const fEsp  = document.getElementById("filter-especialidad")?.value || "";
  const fCosto = document.getElementById("filter-costo")?.value || "";

  state.filtered = state.all.filter(r => {
    // 🔍 texto
    if(q){
      const matchText =
        String(r.procedimiento || "").toLowerCase().includes(q) ||
        String(r.codigo_cups || "").toLowerCase().includes(q);
      if(!matchText) return false;
    }

    // 👤 profesional
    if(fProf && r.profesional !== fProf) return false;

    // 🦷 especialidad
    if(fEsp && r.especialidad !== fEsp) return false;

    // 💰 costo
    if(fCosto === "con" && (r.costo === null || r.costo === "")) return false;
    if(fCosto === "sin" && (r.costo !== null && r.costo !== "")) return false;

    return true;
  });

  render();
}

const { data, error } = await supabase

   async function guardarFila(id){

  const original = state.all.find(r => r.id === id);
  const edit = state.editing.get(id) || {};

  const procedimiento = normalizeName(edit.procedimiento ?? original.procedimiento);
  const especialidad = edit.especialidad ?? original.especialidad;
  const profesional = edit.profesional ?? original.profesional;
  const valor = money(edit.valor ?? original.valor);
  const costo = money(edit.costo ?? original.costo);
  const cups = String((edit.codigo_cups ?? original.codigo_cups) || "").trim();

  if(!procedimiento){
    showToast("El nombre del procedimiento es obligatorio", "err");
    return;
  }

  if(!especialidad){
    showToast("La especialidad es obligatoria", "err");
    return;
  }

  if(!cups){
    showToast("El código CUPS es obligatorio", "err");
    return;
  }

  if(valor === null){
    showToast("El precio es obligatorio", "err");
    return;
  }

  const cupsValido = await validarCUPS(cups);
  if(!cupsValido){
    showToast("El código CUPS no existe en la base de datos", "err");
    return;
  }

  const payload = {
    profesional: profesional || null,
    especialidad,
    procedimiento,
    valor,
    costo,
    codigo_cups: cups
  };

  setStatus("Guardando...");

  const { error } = await supabase
    .from("procedimientos_precios")
    .update(payload)
.eq("id", id)
.eq("tenant_id", TENANT_ID);

  setStatus("");

  if(error){
    showToast("Error al guardar: " + error.message, "err");
    return;
  }

  showToast("Guardado ✅", "ok");

  state.editing.delete(id);

  await cargarProcedimientos();
}

    async function guardarTodos(){
  if(state.editing.size === 0){
    showToast("No hay cambios para guardar", "warn");
    return;
  }

  if(!confirm(`¿Guardar ${state.editing.size} cambios?`)) return;

  setStatus("Guardando cambios...");

  const updates = [];

  for(const [id, edit] of state.editing.entries()){

    const procedimiento = normalizeName(edit.procedimiento);
    const valor = money(edit.valor);
    const costo = money(edit.costo);
    const cups = String(edit.codigo_cups || "").trim().padStart(6,"0");

    if(!procedimiento || !edit.especialidad || !cups || valor === null){
      showToast(`Fila ID ${id} tiene datos incompletos`, "err");
      setStatus("");
      return;
    }

    updates.push({
      id,
      profesional: edit.profesional || null,
      especialidad: edit.especialidad || null,
      procedimiento,
      valor,
      costo,
      codigo_cups: cups
    });
  }

  const { error } = await supabase
    .from("procedimientos_precios")
    .upsert(updates, { onConflict: "id" });

  setStatus("");

  if(error){
    console.error(error);
    showToast("Error al guardar cambios", "err");
    return;
  }

  showToast("Todos los cambios guardados ✅", "ok");

  state.editing.clear();
  await cargarProcedimientos();
}

      padding: 18px;
    }
    .topbar{
      max-width: 1100px;
      margin: 0 auto 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .brand h1{
      font-size: 16px;
      margin:0;
      letter-spacing:.2px;
    }
    .meta{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .chip{
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      box-shadow: 0 3px 10px rgba(0,0,0,.03);
      white-space:nowrap;
    }
    .chip b{ color: var(--text); }

    .container{
  max-width: 100%;
  width: 100%;
  margin: 0;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}


    .header{
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }
    .header-left{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .header-left .title{
      font-weight: 800;
      font-size: 14px;
    }
    .header-left .count{
      color: var(--muted);
      font-size: 12px;
    }
    .header-actions{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap: wrap;
    }

    input[type="text"], input[type="number"]{
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
      min-width: 240px;
      font-size: 14px;
      background:#fff;
    }
    input[type="number"]{ min-width: 160px; }


    .btn{
      border: 1px solid var(--line);
      background: #fff;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
    }
    .btn:hover{ filter: brightness(.98); }
    .btn.primary{
      background: var(--brand);
      color:#fff;
      border-color: var(--brand);
    }
    .btn.primary:hover{ background: var(--brand2); border-color: var(--brand2); }
    .btn.danger{
      background: #fff;
      color: var(--danger);
      border-color: #f2c6c6;
    }

    .new-row{
      padding: 14px 16px;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      align-items:center;
    }
    .new-row .hint{
      color: var(--muted);
      font-size: 12px;
      margin-left:auto;
    }

    table{
      width:100%;
      border-collapse: collapse;
    }
    th, td{
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      text-align:left;
      vertical-align: middle;
    }
    th{
      font-size: 12px;
      color: var(--muted);
      background: #fafafa;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    td input{
      width: 100%;
      min-width: auto;
      padding: 10px 10px;
    }
    td.actions{
      min-width: 200px;
      white-space: nowrap;
    }
    td.actions .btn{
      margin-right: 8px;
    }
    tr.dirty td{
      background: #fffdf3;
    }

    .footer{
      padding: 12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .status{
      font-size: 12px;
      color: var(--muted);
    }

    /* Toast */
    #toast{
      position: fixed;
      right: 16px;
      bottom: 16px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: var(--shadow);
      font-weight: 800;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .15s ease, transform .15s ease;
      pointer-events: none;
    }
    #toast.show{
      opacity: 1;
      transform: translateY(0);
    }
    #toast[data-type="ok"]{ border-color: #b7e4c7; }
    #toast[data-type="err"]{ border-color: #f2c6c6; }
    #toast[data-type="warn"]{ border-color: #ffe7b3; }

    /* Guard (no admin) */
    #guard{
      max-width: 800px;
      margin: 14px auto;
      background:#fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      display:none;
    }
    #guard h2{ margin:0 0 8px; font-size: 16px; }
    #guard p{ margin:0; color: var(--muted); }

    @media (max-width: 560px){
      input[type="text"]{ min-width: 100%; }
      input[type="number"]{ min-width: 100%; }
      td.actions{ width:auto; }
      .header{ align-items:flex-start; flex-direction: column; }
      .header-actions{ width: 100%; }
    }

    /* ===== Ajustes agregados (responsive + columna costo) ===== */

    /* Columna costo en color */
    th.col-costo{ color: #949494; }
    td.col-costo input{ color: #FF7657; font-weight: 800; }

    /* Responsive: evitar overflow por min-width de inputs */
    td input{
      min-width: 0 !important;
    }

    /* Tabla se adapta mejor al ancho */
    table{
      table-layout: auto;
      width: 100%;
      max-width: 100%;
    }
    th, td{
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
    }

    /* Scroll horizontal solo si hace falta en pantallas pequeñas */
    @media (max-width: 900px){
      table{ min-width: 100%; }
    }
    /* Color columna VALOR */
  th.col-valor {
  color: #949494;
}

td.col-valor input {
  color: #1DAD95;
  font-weight: 700;
}

  
    /* ===== NUEVO: selects compactos ===== */
    select{
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      background: #fff;
      width: 100%;
    }


    /* ===== OVERRIDE RESPONSIVE FINAL ===== */
    table, thead, tbody, tr, th, td{
      max-width: 100% !important;
    }

    /* ===== FILTROS EN FILA ===== */
.filters-row{
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap; /* importante para pantallas pequeñas */
}

.filters-row input,
.filters-row select{
  min-width: 180px;
  max-width: 260px;
}

  /* ===== FILTROS RESPONSIVE (MÓVIL) ===== */
@media (max-width: 900px){
  .filters-row{
    flex-direction: column;
    align-items: stretch;
  }

  .filters-row input,
  .filters-row select{
    width: 100%;
    max-width: 100%;
  }
}
/* ===== MODAL ===== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  background:#fff;
  padding:24px;
  border-radius:14px;
  width:420px;
  max-width:95%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.modal-content h3{
  margin:0 0 10px;
}

.modal-content input,
.modal-content select{
  width:100%;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:10px;
}

#btn-rips {
  background-color: #FCE05B;
  border-color: #FCE05B;
  color: #1f2a37;
  font-weight: 700;
}

#btn-rips:hover {
  filter: brightness(0.95);
}
    
</style>
</head>
