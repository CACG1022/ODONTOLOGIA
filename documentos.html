</div>

<script>
  
let TENANT_ID = null;

async function obtenerTenantId(){

  const { data:{ session } } = await window.supabase.auth.getSession();

  if(!session){
    alert("Sesión expirada");
    window.location.href = "login.html";
    return;
  }

  const { data: perfil, error } = await window.supabase
    .from("profiles")
    .select("tenant_id")
    .eq("id", session.user.id)
    .single();

  if(error || !perfil?.tenant_id){
    alert("No se pudo obtener el tenant_id");
    return;
  }

  TENANT_ID = perfil.tenant_id;
}
  
async function subir(){

const archivo = document.getElementById("archivo").files[0]

if(!archivo){
alert("Seleccione un archivo")
return
}

const documento = document.getElementById("documento").value.trim()
const tipo = document.getElementById("tipo").value
const fecha = document.getElementById("fecha").value

if(!documento){
alert("Debe diligenciar el campo Documento paciente")
return
}

if(!tipo){
alert("Debe seleccionar el Tipo documento")
return
}

if(!fecha){
alert("Debe diligenciar la Fecha")
return
}

if(!TENANT_ID){
alert("No se pudo identificar el tenant del usuario")
return
}

const formData = new FormData()

formData.append("file", archivo)
formData.append("documento", documento)
formData.append("tipo", tipo)
formData.append("fecha", fecha)
formData.append("tenant_id", TENANT_ID)  

const barra = document.getElementById("barra")
const mensaje = document.getElementById("mensaje")

mensaje.style.color="#1f2937"
mensaje.innerText="Subiendo archivo..."

barra.style.width="0%"

const xhr = new XMLHttpRequest()

xhr.upload.onprogress = function(e){

if(e.lengthComputable){

let porcentaje = (e.loaded / e.total) * 100
barra.style.width = porcentaje + "%"

}

}

xhr.onload = function(){

if(xhr.status === 200){

mensaje.style.color="green"
mensaje.innerText="Archivo subido correctamente"
barra.style.width="100%"

}else{

mensaje.style.color="red"
mensaje.innerText="Error al subir archivo"

}

}

xhr.open("POST","https://ftth-n8n2.pzveh5.easypanel.host/webhook/dc74c235-f669-4f21-ac09-7e2531caa95a")

xhr.send(formData)

}

 function cargarDatosIniciales(){

const params = new URLSearchParams(window.location.search)
const doc = params.get("doc") || ""

const inputDocumento = document.getElementById("documento")
const inputFecha = document.getElementById("fecha")

if(inputDocumento && doc){

inputDocumento.value = doc
inputDocumento.readOnly = true

}

if(inputFecha){
const hoy = new Date()
const yyyy = hoy.getFullYear()
const mm = String(hoy.getMonth() + 1).padStart(2,"0")
const dd = String(hoy.getDate()).padStart(2,"0")
inputFecha.value = `${yyyy}-${mm}-${dd}`
}

}

document.addEventListener("DOMContentLoaded", cargarDatosIniciales) 
document.addEventListener("DOMContentLoaded", async ()=>{
  await obtenerTenantId();
});
  
document.addEventListener("DOMContentLoaded", function(){

const inputDocumento = document.getElementById("documento")

if(!inputDocumento.value){

alert("Debe ingresar el documento del paciente para subir archivos")

}

})

</script>
