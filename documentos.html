
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DENTOVA · Documentos Clínicos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f7fb;
margin:0;
}

header{
background:#1f4e79;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
margin-bottom:25px;
}

h2{
margin-top:0;
color:#1f4e79;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,select,textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

textarea{
resize:vertical;
}

.file-box{
border:2px dashed #9fb7d6;
padding:35px;
text-align:center;
border-radius:10px;
background:#f9fbff;
}

button{
background:#1f4e79;
color:white;
border:none;
padding:12px 25px;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#163a5c;
}

.progress{
margin-top:15px;
height:10px;
background:#e2e8f0;
border-radius:5px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#2ecc71;
}

.msg{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
DENTOVA · Documentos Clínicos
</header>

<div class="container">

<div class="card">

<h2>Información del Paciente</h2>

<div class="grid">

<div>
<label>Documento paciente</label>
<input id="documento" required>
</div>

<div>
<label>Nombre paciente</label>
<input id="nombre">
</div>

<div>
<label>Profesional</label>
<input id="profesional">
</div>

<div>
<label>Tipo documento</label>
<select id="tipo">
<option value="radiografias">Radiografía</option>
<option value="fotografias">Fotografía</option>
<option value="documentos">Documento</option>
</select>
</div>

</div>

<br>

<label>Observaciones</label>
<textarea id="observaciones"></textarea>

</div>

<div class="card">

<h2>Subir archivo</h2>

<div class="file-box">

<input type="file" id="archivo">

<br><br>

<button onclick="subir()">Subir documento</button>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

<div class="msg" id="mensaje"></div>

</div>

</div>

</div>

<script>

async function subir(){

const archivo = document.getElementById("archivo").files[0]

if(!archivo){
alert("Seleccione un archivo")
return
}

const documento = document.getElementById("documento").value
const nombre = document.getElementById("nombre").value
const profesional = document.getElementById("profesional").value
const tipo = document.getElementById("tipo").value
const observaciones = document.getElementById("observaciones").value

const formData = new FormData()

formData.append("file", archivo)
formData.append("documento", documento)
formData.append("nombre", nombre)
formData.append("profesional", profesional)
formData.append("tipo", tipo)
formData.append("observaciones", observaciones)

const barra = document.getElementById("barra")
const mensaje = document.getElementById("mensaje")

mensaje.innerText="Subiendo archivo..."

const xhr = new XMLHttpRequest()

xhr.upload.onprogress = function(e){

if(e.lengthComputable){

let porcentaje = (e.loaded / e.total) * 100
barra.style.width = porcentaje + "%"

}

}

xhr.onload = function(){

if(xhr.status === 200){

mensaje.style.color="green"
mensaje.innerText="Archivo subido correctamente"

barra.style.width="100%"

}else{

mensaje.style.color="red"
mensaje.innerText="Error al subir archivo"

}

}

xhr.open("POST","https://ftth-n8n2.pzveh5.easypanel.host/webhook/dc74c235-f669-4f21-ac09-7e2531caa95a")

xhr.send(formData)

}

</script>

</body>
</html>
