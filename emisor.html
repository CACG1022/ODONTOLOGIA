<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emisor DIAN · Configuración Empresa</title>

  <!-- Tipografía profesional -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- ✅ SUPABASE UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>

  <script>
    // =========================
    // ✅ SUPABASE CLIENT (UMD)
    // =========================
    const SUPABASE_URL = "https://dmcfrmpqlkrqbpjhrfyo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE";

    const LOGIN_URL = "login.html";
    const INDEX_URL = "index.html";

    // ✅ IMPORTANTE: en UMD la variable global es "supabase"
    if (!window.supabase) {
      console.error("❌ No cargó Supabase UMD. Revisa el <script src=...> o bloqueadores.");
      alert("❌ No se cargó Supabase. Revisa conexión/bloqueador.");
    }

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let EMISOR_ID = null;

    // =========================
    // 🔐 VALIDAR SESIÓN Y ROL
    // =========================
    async function verificarSesionYPermisos(){
      const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();

      if (sessionError) {
        console.error("❌ Error getSession:", sessionError);
        alert("❌ Error verificando sesión");
        window.location.href = INDEX_URL;
        return false;
      }

      if (!session) {
        window.location.href = LOGIN_URL;
        return false;
      }

      const { data: perfil, error } = await supabaseClient
        .from("profiles")
        .select("role")
        .eq("id", session.user.id)
        .maybeSingle();

      if (error) {
        console.error("❌ Error leyendo perfil:", error);
        alert("❌ No se pudo verificar el rol del usuario");
        window.location.href = INDEX_URL;
        return false;
      }

      const rol = String(perfil?.role || "").toLowerCase();

      if (rol !== "admin") {
        alert("⛔ Solo el administrador puede acceder a este módulo.");
        window.location.href = INDEX_URL;
        return false;
      }

      console.log("✅ Acceso Emisor DIAN autorizado (rol admin)");
      return true;
    }

    // =========================
    // 📦 CARGAR / GUARDAR EMISOR
    // =========================
    async function cargarEmisor(){
      const { data, error } = await supabaseClient
        .from("emisor_dian")
        .select("*")
        .limit(1)
        .maybeSingle();

      console.log("📦 Resultado emisor_dian:", { data, error });

      if (error) {
        console.error("❌ Error cargando emisor:", error);
        alert("❌ Error cargando emisor (revisa consola)");
        return;
      }

      if (!data) {
        console.warn("⚠️ No hay registros en emisor_dian.");
        return;
      }

      EMISOR_ID = data.id;

      Object.keys(data).forEach(k => {
        const el = document.getElementById(k);
        if (!el) return;

        if (el.type === "checkbox") el.checked = !!data[k];
        else el.value = data[k] ?? "";
      });

      // por si "activo" no se detecta por type
      const activoEl = document.getElementById("activo");
      if (activoEl) activoEl.checked = !!data.activo;
    }

    async function guardarEmisor(){
      // Referencias seguras
      const nit = document.getElementById("nit");
      const dv = document.getElementById("dv");
      const codPrestador = document.getElementById("codPrestador");
      const razon_social = document.getElementById("razon_social");
      const nombre_comercial = document.getElementById("nombre_comercial");
      const direccion = document.getElementById("direccion");
      const municipio = document.getElementById("municipio");
      const departamento = document.getElementById("departamento");
      const codigo_municipio = document.getElementById("codigo_municipio");
      const pais = document.getElementById("pais");
      const correo = document.getElementById("correo");
      const telefono = document.getElementById("telefono");
      const resolucion_numero = document.getElementById("resolucion_numero");
      const resolucion_fecha = document.getElementById("resolucion_fecha");
      const prefijo = document.getElementById("prefijo");
      const rango_desde = document.getElementById("rango_desde");
      const rango_hasta = document.getElementById("rango_hasta");
      const ambiente = document.getElementById("ambiente");
      const activo = document.getElementById("activo");

      const payload = {
        nit: nit?.value || "",
        dv: dv?.value || "",
        codPrestador: codPrestador?.value || "",
        razon_social: razon_social?.value || "",
        nombre_comercial: nombre_comercial?.value || "",
        direccion: direccion?.value || "",
        municipio: municipio?.value || "",
        departamento: departamento?.value || "",
        codigo_municipio: codigo_municipio?.value || "",
        pais: pais?.value || "CO",
        correo: correo?.value || "",
        telefono: telefono?.value || "",
        resolucion_numero: resolucion_numero?.value || "",
        resolucion_fecha: resolucion_fecha?.value || null,
        prefijo: prefijo?.value || "",
        rango_desde: rango_desde?.value ? parseInt(rango_desde.value, 10) : null,
        rango_hasta: rango_hasta?.value ? parseInt(rango_hasta.value, 10) : null,
        ambiente: ambiente?.value || "PRUEBAS",
        activo: !!activo?.checked
      };

      const res = EMISOR_ID
        ? await supabaseClient.from("emisor_dian").update(payload).eq("id", EMISOR_ID)
        : await supabaseClient.from("emisor_dian").insert([payload]);

      if (res.error) {
        console.error("❌ Error guardando:", res.error);
        alert("❌ Error guardando información (revisa consola)");
        return;
      }

      alert("✅ Emisor guardado correctamente");
      await cargarEmisor();
    }

    // ✅ Para que funcione onclick="guardarEmisor()"
    window.guardarEmisor = guardarEmisor;

    // =========================
    // ✅ INICIO
    // =========================
    document.addEventListener("DOMContentLoaded", async () => {
      const ok = await verificarSesionYPermisos();
      if (ok) await cargarEmisor();
    });
  </script>

  <style>
    :root{
      --bg:#f4f6f9;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --brand:#2563eb;
      --radius:16px;
      --shadow:0 18px 40px rgba(15,23,42,.08);
      --font:"Inter",system-ui,Arial;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:var(--font);
      background:var(--bg);
      color:var(--text);
      padding:32px 16px;
    }
    .wrap{ max-width:980px; margin:auto; }
    h1{ text-align:center; font-size:26px; font-weight:900; margin-bottom:6px; }
    .subtitle{ text-align:center; color:var(--muted); font-size:14px; margin-bottom:24px; }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px;
      border:1px solid var(--line);
    }
    .section{ margin-bottom:28px; }
    .section h3{
      margin:0 0 14px;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:18px 22px;
    }
    .full{ grid-column:1/-1; }
    label{
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      margin-bottom:6px;
      display:block;
    }
    input, select{
      width:100%;
      padding:14px 14px;
      border-radius:12px;
      border:1.6px solid var(--line);
      font-size:14px;
      font-family:var(--font);
      outline:none;
      background:#fff;
    }
    input:focus, select:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(37,99,235,.12);
    }
    .checkline{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
      font-size:14px;
      font-weight:700;
    }
    .actions{ display:flex; justify-content:flex-end; margin-top:10px; }
    button{
      padding:14px 26px;
      border:none;
      border-radius:14px;
      background:var(--brand);
      color:#fff;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(37,99,235,.35);
    }
    @media(max-width:700px){ .grid{ grid-template-columns:1fr; } }
  </style>

  <!-- ========================= -->
  <!-- 🎨 NUEVO: estilos modal sedes (solo se agrega, no modifica estilos existentes) -->
  <!-- ========================= -->
  <style>
    .modal-overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(2,6,23,.55);
      padding:18px;
      z-index:9999;
    }
    .modal{
      width:min(680px, 100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 30px 70px rgba(2,6,23,.35);
      overflow:hidden;
    }
    .modal-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      padding:18px 18px 12px;
      border-bottom:1px solid var(--line);
      background:#ffffff;
    }
    .modal-title{ font-weight:900; font-size:16px; }
    .modal-subtitle{ color:var(--muted); font-size:12px; margin-top:2px; }
    .modal-close{
      background:transparent;
      border:none;
      cursor:pointer;
      font-size:18px;
      line-height:1;
      padding:8px 10px;
      border-radius:12px;
    }
    .modal-body{ padding:16px 18px; }
    .modal-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      padding:14px 18px 18px;
      border-top:1px solid var(--line);
      background:#ffffff;
    }
    .btn-secondary{
      background:#0f172a;
      color:#fff;
      box-shadow:none;
    }
    .table-sedes td{ padding:12px 14px; border-bottom:1px solid var(--line); font-size:13px; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Emisor DIAN</h1>
    <div class="subtitle">Información fiscal y de facturación electrónica de la empresa</div>

    <div class="card">
      <div class="section">
        <h3>Identificación</h3>
        <div class="grid">
          <div><label>NIT</label><input id="nit"></div>
          <div><label>DV</label><input id="dv"></div>
          <div class="full"><label>Razón social</label><input id="razon_social"></div>
          <div class="full"><label>Nombre comercial</label><input id="nombre_comercial"></div>
          <div><label>Código Prestador</label> <input id="codPrestador" placeholder="Ej: 1500101234"></div>
        </div>
      </div>

   

      <div class="section">
        <h3>Ubicación</h3>
        <div class="grid">
          <div class="full"><label>Dirección</label><input id="direccion"></div>
          <div><label>Municipio</label><input id="municipio"></div>
          <div><label>Departamento</label><input id="departamento"></div>
          <div><label>Código municipio</label><input id="codigo_municipio"></div>
          <div><label>País</label><input id="pais" value="CO"></div>
        </div>
      </div>

      <div class="section">
        <h3>Contacto</h3>
        <div class="grid">
          <div><label>Correo</label><input id="correo" type="email"></div>
          <div><label>Teléfono</label><input id="telefono"></div>
        </div>
      </div>

      <div class="section">
        <h3>Resolución DIAN</h3>
        <div class="grid">
          <div><label>No. Resolución</label><input id="resolucion_numero"></div>
          <div><label>Fecha resolución</label><input id="resolucion_fecha" type="date"></div>
          <div><label>Prefijo</label><input id="prefijo"></div>
          <div><label>Rango desde</label><input id="rango_desde" type="number"></div>
          <div><label>Rango hasta</label><input id="rango_hasta" type="number"></div>
          <div>
            <label>Ambiente</label>
            <select id="ambiente">
              <option value="PRUEBAS">PRUEBAS</option>
              <option value="PRODUCCION">PRODUCCIÓN</option>
            </select>
          </div>
        </div>

        <div class="checkline">
          <input type="checkbox" id="activo">
          Emisor activo
        </div>
      </div>

      <div class="actions">
        <button onclick="guardarEmisor()">Guardar información</button>
      </div>
    </div>

    <!-- ========================= -->
    <!-- 🏥 NUEVO: Gestión de sedes -->
    <!-- ========================= -->
    <div class="card" style="margin-top:22px;">
      <div class="section">
        <h3>Sedes</h3>
        <div class="grid">
          <div class="full">
            <button type="button" id="btnAbrirModalSede" onclick="abrirModalSede()">Agregar sede</button>
          </div>
        </div>
        <div class="grid" style="margin-top:14px;">
          <div class="full">
            <label>Sedes registradas</label>
            <div style="overflow:auto; border:1px solid var(--line); border-radius:12px;">
              <table class="table-sedes" style="width:100%; border-collapse:collapse; min-width:720px;">
                <thead>
                  <tr>
                    <th style="text-align:left; padding:12px 14px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--line); background:#f8fafc;">Nombre</th>
                    <th style="text-align:left; padding:12px 14px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--line); background:#f8fafc;">Dirección</th>
                    <th style="text-align:left; padding:12px 14px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--line); background:#f8fafc;">Código REPS</th>
                    <th style="text-align:left; padding:12px 14px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--line); background:#f8fafc;">Activo</th>
                    <th style="text-align:left; padding:12px 14px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--line); background:#f8fafc;">Creado</th>
                  </tr>
                </thead>
                <tbody id="tbody_sedes">
                  <tr><td colspan="5" style="padding:14px; color:var(--muted);">Cargando sedes...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ========================= -->
    <!-- 🪟 NUEVO: Modal crear sede -->
    <!-- ========================= -->
    <div id="modalSedeOverlay" class="modal-overlay" aria-hidden="true">
      <div class="modal">
        <div class="modal-header">
          <div>
            <div class="modal-title">Agregar sede</div>
            <div class="modal-subtitle">Crea una nueva sede para habilitación / RIPS</div>
          </div>
          <button type="button" class="modal-close" onclick="cerrarModalSede()" aria-label="Cerrar">✕</button>
        </div>

        <div class="modal-body">
          <div class="grid" style="grid-template-columns:repeat(2,1fr); gap:14px 16px;">
            <div class="full">
              <label>Nombre</label>
              <input id="sede_nombre" placeholder="Ej: Dentova Sede Principal" />
            </div>
            <div class="full">
              <label>Dirección</label>
              <input id="sede_direccion" placeholder="Ej: Cra 15 # 93-60" />
            </div>
            <div>
              <label>Código REPS</label>
              <input id="sede_codigo_reps" placeholder="Ej: 1100101234" />
            </div>
            <div style="display:flex; align-items:flex-end;">
              <label class="checkline" style="margin:0;">
                <input type="checkbox" id="sede_activo" checked />
                Sede activa
              </label>
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="cerrarModalSede()">Cancelar</button>
          <button type="button" onclick="guardarSede()">Guardar sede</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ========================= -->
  <!-- 🧠 NUEVO: lógica sedes (solo se agrega, no modifica scripts existentes) -->
  <!-- ========================= -->
  <script>
    // =========================
    // 🏥 SEDES · UI + CRUD básico
    // =========================
    function abrirModalSede(){
      const ov = document.getElementById("modalSedeOverlay");
      if (!ov) return;
      ov.style.display = "flex";
      ov.setAttribute("aria-hidden","false");
      // limpiar campos (solo si existen)
      const n = document.getElementById("sede_nombre");
      const d = document.getElementById("sede_direccion");
      const c = document.getElementById("sede_codigo_reps");
      const a = document.getElementById("sede_activo");
      if (n) n.value = "";
      if (d) d.value = "";
      if (c) c.value = "";
      if (a) a.checked = true;
    }

    function cerrarModalSede(){
      const ov = document.getElementById("modalSedeOverlay");
      if (!ov) return;
      ov.style.display = "none";
      ov.setAttribute("aria-hidden","true");
    }

    async function cargarSedesTabla(){
      const tbody = document.getElementById("tbody_sedes");
      if (!tbody) return;

      const { data, error } = await supabaseClient
        .from("sedes")
        .select("id,nombre,direccion,codigo_reps,activo,created_at")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("❌ Error cargando sedes:", error);
        tbody.innerHTML = `<tr><td colspan="5" style="padding:14px; color:var(--muted);">Error cargando sedes</td></tr>`;
        return;
      }

      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="padding:14px; color:var(--muted);">No hay sedes registradas.</td></tr>`;
        return;
      }

      tbody.innerHTML = "";
      data.forEach(s => {
        const created = s.created_at ? new Date(s.created_at).toLocaleString() : "";
        tbody.insertAdjacentHTML("beforeend", `
          <tr>
            <td style="padding:12px 14px; border-bottom:1px solid var(--line); font-weight:800;">${(s.nombre ?? "").replaceAll("<","&lt;").replaceAll(">","&gt;")}</td>
            <td style="padding:12px 14px; border-bottom:1px solid var(--line);">${(s.direccion ?? "").replaceAll("<","&lt;").replaceAll(">","&gt;")}</td>
            <td style="padding:12px 14px; border-bottom:1px solid var(--line);">${(s.codigo_reps ?? "").replaceAll("<","&lt;").replaceAll(">","&gt;")}</td>
            <td style="padding:12px 14px; border-bottom:1px solid var(--line);">${s.activo ? "Sí" : "No"}</td>
            <td style="padding:12px 14px; border-bottom:1px solid var(--line); color:var(--muted); font-size:12px;">${created}</td>
          </tr>
        `);
      });
    }

    async function guardarSede(){
      const nombre = document.getElementById("sede_nombre")?.value?.trim();
      const direccion = document.getElementById("sede_direccion")?.value?.trim();
      const codigo_reps = document.getElementById("sede_codigo_reps")?.value?.trim();
      const activo = !!document.getElementById("sede_activo")?.checked;

      if (!nombre) { alert("⚠️ El nombre de la sede es obligatorio."); return; }

      const { error } = await supabaseClient
        .from("sedes")
        .insert([{ nombre, direccion, codigo_reps, activo }]);

      if (error) {
        console.error("❌ Error guardando sede:", error);
        alert("❌ No se pudo guardar la sede (revisa consola)");
        return;
      }

      cerrarModalSede();
      await cargarSedesTabla();
      alert("✅ Sede guardada");
    }

    // Exponer funciones para onclick
    window.abrirModalSede = abrirModalSede;
    window.cerrarModalSede = cerrarModalSede;
    window.guardarSede = guardarSede;

    // Cargar sedes al iniciar (sin tocar el init existente; se agrega otro listener)
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        // Reusa el verificador existente si está disponible
        if (typeof window.verificarSesionYPermisos === "function") {
          const ok = await window.verificarSesionYPermisos();
          if (!ok) return;
        }
        await cargarSedesTabla();
      } catch (e) {
        console.error("❌ Error inicializando sedes:", e);
      }
    });

    // Cerrar modal al hacer click fuera
    document.addEventListener("click", (ev) => {
      const ov = document.getElementById("modalSedeOverlay");
      if (!ov) return;
      if (ov.style.display !== "flex") return;
      if (ev.target === ov) cerrarModalSede();
    });
  </script>
</body>
</html>
