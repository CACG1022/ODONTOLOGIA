<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://dmcfrmpqlkrqbpjhrfyo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const state = {
  page: 1,
  pageSize: 25,
  total: 0,
  rows: [],
  loading: false,
};

const $ = (id) => document.getElementById(id);

function setStatus(msg){
  $("status").textContent = msg || "";
}

function setCount(n){
  $("count").textContent = String(n ?? 0);
}

async function checkAuth(){

  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    setStatus("Debes iniciar sesión.");
    return false;
  }

  const userId = session.user.id;

  const { data: profile, error } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", userId)
    .single();

  if (error || !profile) {
    setStatus("No se pudo validar perfil.");
    return false;
  }

  if (profile.role !== "admin") {
    setStatus("Acceso restringido. Solo administradores.");
    return false;
  }

  return true;
}

async function cargarLogs(){

  if(state.loading) return;
  state.loading = true;
  setStatus("Cargando restore_logs...");

  try {

    const from = (state.page - 1) * state.pageSize;
    const to = from + state.pageSize - 1;

    const { data, error, count } = await supabase
      .from("restore_logs")
      .select("*", { count: "exact" })
      .order("created_at", { ascending: false })
      .range(from, to);

    if(error) throw error;

    state.rows = data || [];
    state.total = count || 0;

    setCount(state.total);
    renderRows();

    setStatus(`Mostrando ${state.rows.length} registros`);

  } catch(err){
    console.error(err);
    setStatus("Error cargando datos");
  } finally {
    state.loading = false;
  }
}

function renderRows(){

  const tbody = $("tbody");

  if(!state.rows.length){
    tbody.innerHTML = `<tr><td colspan="8">No hay registros</td></tr>`;
    return;
  }

  tbody.innerHTML = "";

  state.rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.id}</td>
      <td>${r.backup_id ?? "—"}</td>
      <td>${r.table_name ?? "—"}</td>
      <td>${r.patient_document ?? "—"}</td>
      <td>${r.mode ?? "—"}</td>
      <td>${r.rows_affected ?? "—"}</td>
      <td>${r.status ?? "—"}</td>
      <td>${r.created_at ?? "—"}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function init(){

  const allowed = await checkAuth();
  if(!allowed) return;

  cargarLogs();
}

window.addEventListener("DOMContentLoaded", init);
</script>
