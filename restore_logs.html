<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restore Logs</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1222;
  color:#fff;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
h1{
  margin-bottom:10px;
}
.table-box{
  background:#0f1b2e;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
table{
  width:100%;
  border-collapse:collapse;
}
th, td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:13px;
}
th{
  background:#111c33;
  text-align:left;
}
tr:hover{
  background:rgba(255,255,255,.05);
}
.status{
  margin:10px 0;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>
<div class="container">
  <h1>Restore Logs</h1>
  <div class="status">
    Registros: <span id="count">0</span> |
    <span id="status"></span>
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Backup</th>
          <th>Tabla</th>
          <th>Documento</th>
          <th>Modo</th>
          <th>Filas</th>
          <th>Status</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dmcfrmpqlkrqbpjhrfyo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE"
);

const $ = (id)=>document.getElementById(id);

function setStatus(msg){
  $("status").textContent = msg || "";
}

function setCount(n){
  $("count").textContent = n ?? 0;
}

async function checkAuth(){

  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    setStatus("No hay sesión activa.");
    return false;
  }

  const { data:profile } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", session.user.id)
    .single();

  if(!profile || profile.role !== "admin"){
    setStatus("Acceso restringido.");
    return false;
  }

  return true;
}

async function cargar(){

  setStatus("Cargando datos...");

  const { data, error } = await supabase
    .from("restore_logs")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    setStatus("Error cargando datos");
    return;
  }

  setCount(data.length);

  const tbody = $("tbody");
  tbody.innerHTML="";

  if(!data.length){
    tbody.innerHTML="<tr><td colspan='8'>No hay registros</td></tr>";
    return;
  }

  data.forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${r.id}</td>
      <td>${r.backup_id ?? "-"}</td>
      <td>${r.table_name ?? "-"}</td>
      <td>${r.patient_document ?? "-"}</td>
      <td>${r.mode ?? "-"}</td>
      <td>${r.rows_affected ?? "-"}</td>
      <td>${r.status ?? "-"}</td>
      <td>${r.created_at ?? "-"}</td>
    `;
    tbody.appendChild(tr);
  });

  setStatus("Listo");
}

async function init(){
  const ok = await checkAuth();
  if(!ok) return;
  cargar();
}

init();
</script>

</body>
</html>
