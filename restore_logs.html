  <!-- Supabase JS (ESM) -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // =========================
    // ✅ CONFIG SUPABASE (TU PROYECTO)
    // =========================
    const SUPABASE_URL = "https://dmcfrmpqlkrqbpjhrfyo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =========================
    // ✅ UI STATE
    // =========================
    const state = {
      page: 1,
      pageSize: 25,
      total: 0,
      rows: [],
      loading: false,
    };

    const $ = (id) => document.getElementById(id);

    function esc(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function fmtDate(s){
      if(!s) return "—";
      // created_at está como text en tu tabla. Intentamos parsear:
      const d = new Date(s);
      if(!Number.isNaN(d.getTime())){
        return d.toLocaleString("es-CO", {
          year:"numeric", month:"2-digit", day:"2-digit",
          hour:"2-digit", minute:"2-digit", second:"2-digit"
        });
      }
      return String(s);
    }

    function setStatus(msg){
      const el = $("status");
      if(el) el.textContent = msg || "";
    }

    function setCount(n){
      const el = $("count");
      if(el) el.textContent = String(n ?? 0);
    }

    function setPager(){
      $("page").textContent = String(state.page);
      $("pageSizeLabel").textContent = String(state.pageSize);
      $("btn-prev").disabled = state.page <= 1 || state.loading;
      const maxPage = Math.max(1, Math.ceil((state.total || 0) / state.pageSize));
      $("btn-next").disabled = state.page >= maxPage || state.loading;
    }

    function badgeStatus(v){
      const s = String(v || "").toUpperCase();
      if(s === "SUCCESS") return `<span class="badge ok">SUCCESS</span>`;
      if(s === "ERROR" || s === "FAILED") return `<span class="badge err">${esc(s)}</span>`;
      if(s === "PENDING" || s === "RUNNING") return `<span class="badge warn">${esc(s)}</span>`;
      if(!s) return `<span class="badge muted">—</span>`;
      return `<span class="badge">${esc(s)}</span>`;
    }

    function renderRows(){
      const tbody = $("tbody");
      if(!tbody) return;

      if(state.loading){
        tbody.innerHTML = `<tr><td colspan="8" class="empty">Cargando...</td></tr>`;
        return;
      }

      if(!state.rows || state.rows.length === 0){
        tbody.innerHTML = `<tr><td colspan="8" class="empty">No hay registros para ese filtro.</td></tr>`;
        return;
      }

      tbody.innerHTML = "";
      for(const r of state.rows){
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="mono">${esc(r.id)}</td>
          <td class="mono">${esc(r.backup_id || "—")}</td>
          <td>${badgeStatus(r.status)}</td>
          <td class="mono">${esc(r.table_name || "—")}</td>
          <td class="mono">${esc(r.patient_document || "—")}</td>
          <td class="mono">${esc(r.mode || "—")}</td>
          <td class="mono tr">${esc(r.rows_affected ?? "—")}</td>
          <td class="mono">${esc(fmtDate(r.created_at))}</td>
        `;
        tr.addEventListener("click", () => openDrawer(r));
        tbody.appendChild(tr);
      }
    }

    function openDrawer(row){
      $("drawer").classList.add("show");
      $("drawer-title").textContent = "Detalle de restore_logs";
      $("drawer-sub").textContent = `ID: ${row?.id || "—"}`;

      const details = [
        ["id", row.id],
        ["backup_id", row.backup_id],
        ["restored_by", row.restored_by],
        ["restored_by_email", row.restored_by_email],
        ["table_name", row.table_name],
        ["patient_document", row.patient_document],
        ["mode", row.mode],
        ["rows_affected", row.rows_affected],
        ["status", row.status],
        ["error_message", row.error_message],
        ["created_at", fmtDate(row.created_at)],
      ];

      const cont = $("drawer-body");
      cont.innerHTML = details.map(([k,v]) => `
        <div class="kv">
          <div class="k">${esc(k)}</div>
          <div class="v mono">${esc(v ?? "—")}</div>
        </div>
      `).join("");
    }

    function closeDrawer(){
      $("drawer").classList.remove("show");
    }

    // =========================
    // ✅ QUERY SUPABASE
    // =========================
    async function cargarLogs({ resetPage = false } = {}){
      if(state.loading) return;
      state.loading = true;
      renderRows();
      setPager();
      setStatus("Cargando restore_logs...");

      try{
        if(resetPage) state.page = 1;

        const q = ($("q").value || "").trim();
        const status = ($("statusFilter").value || "todos").trim();
        const order = ($("order").value || "reciente").trim();
        const pageSize = parseInt($("pageSize").value || "25", 10) || 25;
        state.pageSize = pageSize;

        // Base query
        let query = supabase
          .from("restore_logs")
          .select("id, backup_id, restored_by, restored_by_email, table_name, patient_document, mode, rows_affected, status, error_message, created_at", { count: "exact" });

        // Filtros
        if(status !== "todos"){
          query = query.eq("status", status);
        }

        // Búsqueda: intenta por varios campos (id, backup_id, table_name, patient_document, restored_by_email, status)
        if(q){
          // ilike sobre texto. OJO: id/uuid también funciona como texto en ilike.
          // Si quieres más estricto, se puede separar por si es UUID.
          const like = `%${q}%`;
          query = query.or([
            `id.ilike.${like}`,
            `backup_id.ilike.${like}`,
            `table_name.ilike.${like}`,
            `patient_document.ilike.${like}`,
            `restored_by_email.ilike.${like}`,
            `status.ilike.${like}`
          ].join(","));
        }

        // Orden
        // created_at es text; igual lo ordena lexicográfico.
        // Si lo guardas en timestamptz sería perfecto.
        const asc = (order === "antiguo");
        query = query.order("created_at", { ascending: asc });

        // Paginación
        const from = (state.page - 1) * state.pageSize;
        const to = from + state.pageSize - 1;
        query = query.range(from, to);

        const { data, error, count } = await query;
        if(error) throw error;

        state.rows = data || [];
        state.total = count || 0;
        setCount(state.total);

        setStatus(`Listo. Mostrando ${state.rows.length} de ${state.total}.`);
      }catch(err){
        console.error(err);
        state.rows = [];
        state.total = 0;
        setCount(0);

        // Mensaje típico si no tienes permisos/RLS:
        const msg = String(err?.message || err || "Error");
        setStatus("Error cargando: " + msg);
        toast("No se pudieron cargar logs:\n" + msg, "err");
      }finally{
        state.loading = false;
        renderRows();
        setPager();
      }
    }

    function toast(msg, type="ok"){
      const el = $("toast");
      el.textContent = msg;
      el.dataset.type = type;
      el.classList.add("show");
      clearTimeout(window.__t);
      window.__t = setTimeout(()=> el.classList.remove("show"), 2600);
    }

    function nextPage(){
      const maxPage = Math.max(1, Math.ceil((state.total || 0) / state.pageSize));
      if(state.page < maxPage){
        state.page++;
        cargarLogs();
      }
    }
    function prevPage(){
      if(state.page > 1){
        state.page--;
        cargarLogs();
      }
    }

    function init(){
      // Defaults
      $("pageSize").value = "25";
      $("statusFilter").value = "todos";
      $("order").value = "reciente";

      // Eventos
      $("btn-refresh").addEventListener("click", () => cargarLogs());
      $("q").addEventListener("keydown", (e) => { if(e.key === "Enter") cargarLogs({ resetPage:true }); });
      $("statusFilter").addEventListener("change", () => cargarLogs({ resetPage:true }));
      $("order").addEventListener("change", () => cargarLogs({ resetPage:true }));
      $("pageSize").addEventListener("change", () => cargarLogs({ resetPage:true }));
      $("btn-next").addEventListener("click", nextPage);
      $("btn-prev").addEventListener("click", prevPage);

      $("drawer-close").addEventListener("click", closeDrawer);
      $("drawer-backdrop").addEventListener("click", closeDrawer);

      // Primera carga
      cargarLogs();
    }

    if(document.readyState === "loading"){
      window.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  </script>
