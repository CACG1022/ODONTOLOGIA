<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel de Backups · DENTOVA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:#111c2e;
  --card-hover:#16263f;
  --text:#eaf2ff;
  --muted:#94a9c9;
  --brand:#3ea6ff;
  --success:#22c55e;
  --danger:#ef4444;
  --border:rgba(255,255,255,.08);
  --radius:18px;
}

*{box-sizing:border-box;font-family:Inter,system-ui;}
body{
  margin:0;
  background:linear-gradient(180deg,#08101d,#050a12);
  color:var(--text);
}

.container{
  max-width:1300px;
  margin:auto;
  padding:30px 20px 60px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.header h1{
  margin:0;
  font-size:24px;
  font-weight:800;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

.auth-box{
  display:flex;
  gap:10px;
  align-items:center;
}

.pill{
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  border:1px solid var(--border);
}

.pill.success{
  background:rgba(34,197,94,.12);
  border-color:rgba(34,197,94,.4);
  color:#bbf7d0;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.filters{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  margin-bottom:20px;
}

input, select, button{
  background:#0f1b2d;
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
}

input{min-width:260px;}

button{
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:rgba(62,166,255,.15);
  border-color:rgba(62,166,255,.5);
}

.btn-success{
  background:rgba(34,197,94,.15);
  border-color:rgba(34,197,94,.5);
}

.btn-danger{
  background:rgba(239,68,68,.15);
  border-color:rgba(239,68,68,.5);
}

.table-wrapper{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:#0c1626;
}

th{
  text-align:left;
  padding:14px 12px;
  font-size:12px;
  letter-spacing:.5px;
  color:#a9c2ff;
}

td{
  padding:16px 12px;
  border-top:1px solid var(--border);
  vertical-align:top;
  font-size:13px;
}

tr:hover{
  background:var(--card-hover);
}

.mono{
  font-family:ui-monospace,monospace;
  font-size:12px;
  color:var(--muted);
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.status-success{
  background:rgba(34,197,94,.12);
  color:#bbf7d0;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(34,197,94,.4);
}

.footer-msg{
  margin-top:15px;
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div>
    <h1>📦 Panel de Backups · DENTOVA</h1>
    <div class="subtitle">Gestión, descarga y restauración segura de respaldos clínicos</div>
  </div>
  <div class="auth-box">
    <span id="authPill" class="pill">🔒 Sin sesión</span>
    <button id="btnLogin" class="btn-primary">Iniciar sesión</button>
    <button id="btnLogout" class="btn-danger" style="display:none;">Cerrar sesión</button>
  </div>
</div>

<div class="card">

<div class="filters">
  <input id="q" placeholder="Buscar por archivo, ID, fecha..." />
  <select id="status">
    <option value="">Estado: Todos</option>
    <option value="SUCCESS">SUCCESS</option>
    <option value="FAILED">FAILED</option>
  </select>
  <select id="sort">
    <option value="backup_date_desc">Más reciente</option>
    <option value="backup_date_asc">Más antiguo</option>
  </select>
  <button id="btnRefresh" class="btn-primary">Actualizar</button>
  <div style="margin-left:auto;font-size:13px;color:var(--muted);">
    Registros: <b id="count">0</b>
  </div>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Archivo</th>
<th>Estado</th>
<th>Datos</th>
<th>Tamaño</th>
<th>SHA256</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div id="infoMsg" class="footer-msg"></div>

</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://dmcfrmpqlkrqbpjhrfyo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const el = id => document.getElementById(id);
const tbody = el("tbody");
const infoMsg = el("infoMsg");

function fmtDate(d){ return new Date(d).toLocaleString(); }
function short(s,n=14){ return s?.length>n? s.slice(0,n)+"…":s; }

async function refresh(){
  infoMsg.textContent="Cargando...";
  tbody.innerHTML="";
  const {data,error} = await supabase.from("backups")
  .select("*")
  .order("backup_date",{ascending:false});

  if(error){
    infoMsg.textContent="Error: "+error.message;
    return;
  }

  el("count").textContent=data.length;

  data.forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
    <td>${fmtDate(r.backup_date)}</td>
    <td>
      <div><strong>${r.file_name}</strong></div>
      <div class="mono">ID: ${short(r.drive_file_id)}</div>
    </td>
    <td><span class="status-success">${r.status}</span></td>
    <td>${r.total_rows} filas<br><span class="mono">${r.total_tables} tablas</span></td>
    <td>${r.file_size_kb} KB</td>
    <td class="mono">${short(r.file_sha256,18)}</td>
    <td>
      <div class="actions">
        <button class="btn-success" onclick="window.open('${r.drive_link}','_blank')">Descargar</button>
      </div>
    </td>
    `;
    tbody.appendChild(tr);
  });

  infoMsg.textContent="";
}

refresh();
</script>
</body>
</html>
