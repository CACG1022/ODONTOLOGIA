<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facturas Generadas</title>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>

<style>

:root{
--bg:#f3f5f7;
--card:#ffffff;
--text:#1f2a37;
--muted:#6b7280;
--line:#e5e7eb;
--brand:#1f6aa5;
--brand2:#114a75;
--ok:#16a34a;
--danger:#dc2626;
--warn:#f59e0b;
--radius:14px;
--shadow:0 10px 30px rgba(0,0,0,.06);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding:20px;
}

h1{
margin-bottom:15px;
}

.container{
background:var(--card);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:18px;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

input,select{
padding:8px 10px;
border-radius:8px;
border:1px solid var(--line);
}

button{
background:var(--brand);
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:var(--brand2);
}

.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.kpi{
background:white;
border:1px solid var(--line);
border-radius:10px;
padding:10px;
}

.kpi .label{
font-size:12px;
color:var(--muted);
}

.kpi .value{
font-size:20px;
font-weight:bold;
}

.table-container{
overflow:auto;
border:1px solid var(--line);
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:8px;
border-bottom:1px solid var(--line);
text-align:left;
}

th{
background:#fafafa;
position:sticky;
top:0;
}

tr:hover{
background:#f9fafb;
}

.badge{
padding:3px 8px;
border-radius:8px;
font-size:11px;
font-weight:bold;
}

.pagada{
background:#dcfce7;
color:#166534;
}

.pendiente{
background:#fee2e2;
color:#991b1b;
}

.detalle{
cursor:pointer;
color:var(--brand);
font-weight:bold;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:600px;
max-width:90%;
}

</style>
</head>

<body>

<h1>Facturas Generadas</h1>

<div class="container">

<div class="filters">

<input type="text" id="buscar" placeholder="Buscar factura, paciente...">

<input type="date" id="desde">
<input type="date" id="hasta">

<select id="estado">
<option value="">Estado</option>
<option value="true">Pagada</option>
<option value="false">Pendiente</option>
</select>

<button onclick="cargarFacturas()">Buscar</button>

</div>

<div class="kpis">

<div class="kpi">
<div class="label">Total Facturado</div>
<div class="value" id="kpiTotal">$0</div>
</div>

<div class="kpi">
<div class="label">Facturas</div>
<div class="value" id="kpiCount">0</div>
</div>

<div class="kpi">
<div class="label">Pagadas</div>
<div class="value" id="kpiPagadas">0</div>
</div>

<div class="kpi">
<div class="label">Pendientes</div>
<div class="value" id="kpiPendientes">0</div>
</div>

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Factura</th>
<th>Fecha</th>
<th>Paciente</th>
<th>EPS</th>
<th>Profesional</th>
<th>Total</th>
<th>Método</th>
<th>Estado</th>
<th>Ver</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>


<div class="modal" id="modal">
<div class="modal-content">

<h3>Detalle factura</h3>

<div id="detalleFactura"></div>

<br>

<button onclick="cerrarModal()">Cerrar</button>

</div>
</div>


<script>

const supabase = supabase.createClient(
"https://dmcfrmpqlkrqbpjhrfyo.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

async function cargarFacturas(){

let query = supabase
.from("facturas")
.select("*")
.order("created_at",{ascending:false})


const buscar = document.getElementById("buscar").value
const desde = document.getElementById("desde").value
const hasta = document.getElementById("hasta").value
const estado = document.getElementById("estado").value


if(buscar){

query=query.or(
`paciente_nombre.ilike.%${buscar}%,numero_factura.ilike.%${buscar}%`
)

}

if(desde){

query=query.gte("fecha",desde)

}

if(hasta){

query=query.lte("fecha",hasta)

}

if(estado!==""){

query=query.eq("pagada",estado==="true")

}

const {data,error}=await query

if(error){

alert(error.message)
return

}

render(data)

}


function render(data){

const tbody=document.getElementById("tbody")

tbody.innerHTML=""

let total=0
let pagadas=0
let pendientes=0


data.forEach(f=>{

total+=Number(f.valor_total||0)

if(f.pagada) pagadas++
else pendientes++

tbody.innerHTML+=`

<tr>

<td>${f.numero_factura||""}</td>

<td>${f.fecha||""}</td>

<td>${f.paciente_nombre||""}</td>

<td>${f.eps||""}</td>

<td>${f.profesional||""}</td>

<td>$${Number(f.valor_total||0).toLocaleString()}</td>

<td>${f.metodo_pago||""}</td>

<td>

<span class="badge ${f.pagada?"pagada":"pendiente"}">

${f.pagada?"Pagada":"Pendiente"}

</span>

</td>

<td>

<span class="detalle" onclick='verFactura(${JSON.stringify(f)})'>

Ver

</span>

</td>

</tr>

`

})


document.getElementById("kpiTotal").innerText="$"+total.toLocaleString()

document.getElementById("kpiCount").innerText=data.length

document.getElementById("kpiPagadas").innerText=pagadas

document.getElementById("kpiPendientes").innerText=pendientes

}


function verFactura(f){

const div=document.getElementById("detalleFactura")

div.innerHTML=`

<b>Número:</b> ${f.numero_factura}<br><br>
<b>Paciente:</b> ${f.paciente_nombre}<br><br>
<b>Profesional:</b> ${f.profesional}<br><br>
<b>EPS:</b> ${f.eps}<br><br>
<b>Subtotal:</b> $${Number(f.subtotal||0).toLocaleString()}<br><br>
<b>IVA:</b> $${Number(f.iva_valor||0).toLocaleString()}<br><br>
<b>Total:</b> $${Number(f.valor_total||0).toLocaleString()}<br><br>
<b>Copago:</b> $${Number(f.copago||0).toLocaleString()}<br><br>
<b>Cuota moderadora:</b> $${Number(f.cuota_moderadora||0).toLocaleString()}<br><br>
<b>Saldo pendiente:</b> $${Number(f.saldo_pendiente||0).toLocaleString()}<br><br>
<b>Método pago:</b> ${f.metodo_pago}<br><br>
<b>Observación:</b> ${f.observacion||""}

`

document.getElementById("modal").style.display="flex"

}


function cerrarModal(){

document.getElementById("modal").style.display="none"

}


cargarFacturas()

</script>

</body>
</html>
