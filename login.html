<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTOVA Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#03141a;
  --bg2:#072c30;
  --bg3:#0a3f43;

  --card: rgba(255,255,255,0.03);
  --line: rgba(255,255,255,0.06);

  --text:#e8fdf9;
  --muted:#7fa3a0;

  --green:#3ddc97;
  --green2:#1fa67a;

  --error:#ff6b6b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
  background: linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
  overflow:hidden;
}

/* fondo animado */
body::before{
  content:"";
  position:absolute;
  width:180%;
  height:180%;
  background: radial-gradient(circle, rgba(61,220,151,0.05), transparent 60%);
  animation: moveBg 14s ease-in-out infinite;
}

@keyframes moveBg{
  0%{transform:translate(-10%, -10%)}
  50%{transform:translate(10%, 10%)}
  100%{transform:translate(-10%, -10%)}
}

.card{
  position:relative;
  width:380px;
  padding:40px 30px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter: blur(16px);
  border:1px solid var(--line);
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
}

.logo{
  text-align:center;
  margin-bottom:25px;
  font-weight:600;
  letter-spacing:1.5px;
  font-size:14px;
}

.logo span{
  display:block;
  font-size:22px;
  color:var(--green);
  margin-top:5px;
}

.logo-wrap{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 14px 0;
}

.logo-glow{
  position:absolute;
  width:360px;
  height:360px;
  border-radius:50%;
  background: radial-gradient(circle,
    rgba(61,220,151,0.55) 0%,
    rgba(61,220,151,0.35) 25%,
    rgba(61,220,151,0.18) 45%,
    rgba(61,220,151,0.08) 60%,
    transparent 75%);
  filter: blur(50px);
  animation: pulseGlow 3s infinite;
  mix-blend-mode: screen;
}

.logo-img{
  width:180px;
  z-index:2;
  position:relative;
  filter:
    drop-shadow(0 15px 25px rgba(0,0,0,0.6))
    drop-shadow(0 0 25px rgba(61,220,151,0.35))
    drop-shadow(0 0 60px rgba(61,220,151,0.25));
  animation: floatLogo 4s infinite;
}

@keyframes floatLogo{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

@keyframes pulseGlow{
  0%{opacity:.6; transform:scale(1)}
  50%{opacity:1; transform:scale(1.1)}
  100%{opacity:.6; transform:scale(1)}
}

input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.02);
  color:white;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg, var(--green2), var(--green));
  font-weight:700;
  cursor:pointer;
}

.footer{
  text-align:center;
  font-size:11px;
  margin-top:20px;
}

#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="card">

<div class="logo">
  SOFTWARE DENTAL

  <div class="logo-wrap">
    <div class="logo-glow"></div>

    <img src="https://static.wixstatic.com/media/63e6ec_7fa8eb772e6a48f7a3fc89e8fa1bd426~mv2.png"
         class="logo-img">
  </div>

  <span>DENTOVA</span>
</div>

<h2>Iniciar sesión</h2>

<input id="email" type="email" placeholder="Correo electrónico">
<input id="password" type="password" placeholder="Contraseña">

<button id="boton-login">ENTRAR</button>

<div class="footer">© 2026 DENTOVA</div>

</div>

<script>
// 🦷 partículas muelitas PRO
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles=[];
let mouse={x:0,y:0};

window.onmousemove=e=>{
  mouse.x=e.x;
  mouse.y=e.y;
};

class Particle{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*12+8;
    this.speedY=Math.random()*0.5+0.2;
  }

  update(){
    this.y-=this.speedY;
    if(this.y<0)this.y=canvas.height;

    let dx=this.x-mouse.x;
    let dy=this.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<120){
      this.x+=dx/10;
      this.y+=dy/10;
    }
  }

  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.scale(this.size/100,this.size/100);

    ctx.beginPath();
    ctx.moveTo(50,10);
    ctx.bezierCurveTo(20,10,10,40,20,70);
    ctx.bezierCurveTo(25,85,35,90,40,70);
    ctx.bezierCurveTo(45,90,55,90,60,70);
    ctx.bezierCurveTo(65,90,75,85,80,70);
    ctx.bezierCurveTo(90,40,80,10,50,10);
    ctx.fillStyle="rgba(61,220,151,0.25)";
    ctx.fill();

    ctx.restore();
  }
}

function init(){
  for(let i=0;i<40;i++){
    particles.push(new Particle());
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
