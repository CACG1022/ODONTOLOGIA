<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTOVA Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#071b1f;
  --card: rgba(255,255,255,0.04);
  --line: rgba(255,255,255,0.08);
  --text:#e6f7f5;
  --muted:#8aa3a0;
  --green:#39d98a;
  --green2:#1f9d6b;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at 20% 20%, #0c2a2f, #041316 60%);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
  overflow:hidden;
}

/* subtle moving gradient */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(57,217,138,0.08), transparent 60%);
  animation: moveBg 12s linear infinite;
}

@keyframes moveBg{
  0%{transform:translate(-10%, -10%)}
  50%{transform:translate(10%, 10%)}
  100%{transform:translate(-10%, -10%)}
}

.card{
  position:relative;
  width:380px;
  padding:40px 30px;
  border-radius:20px;
  background:var(--card);
  backdrop-filter: blur(14px);
  border:1px solid var(--line);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* scan line effect */
.card::after{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--green), transparent);
  animation: scan 3s linear infinite;
}

@keyframes scan{
  0%{top:0}
  100%{top:100%}
}

.logo{
  text-align:center;
  margin-bottom:25px;
  font-weight:700;
  letter-spacing:2px;
}

.logo span{
  color:var(--green);
}

h2{
  margin:0 0 10px;
  font-weight:600;
}

p{
  margin:0 0 25px;
  font-size:14px;
  color:var(--muted);
}

.input{
  width:100%;
  margin-bottom:15px;
  position:relative;
}

.input input{
  width:100%;
  padding:14px 15px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.02);
  color:white;
  outline:none;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg, var(--green2), var(--green));
  color:#06221b;
  font-weight:700;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

/* button loading effect */
button::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: load 2s infinite;
}

@keyframes load{
  0%{left:-100%}
  100%{left:100%}
}

.footer{
  text-align:center;
  font-size:12px;
  margin-top:20px;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="card">

  <div class="logo">
    SOFTWARE DENTAL<br>
    <span>DENTOVA</span>
  </div>

  <h2>Iniciar sesión</h2>
  <p>Acceso seguro al sistema clínico</p>

  <div class="input">
    <input type="email" placeholder="Correo electrónico">
  </div>

  <div class="input">
    <input type="password" placeholder="Contraseña">
  </div>

  <div class="row">
    <label><input type="checkbox"> Recordar</label>
    <span>¿Olvidaste?</span>
  </div>

  <button>ENTRAR AL SISTEMA</button>

  <div class="footer">
    © 2026 DENTOVA
  </div>

</div>

</body>
</html>
