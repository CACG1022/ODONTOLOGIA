<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTOVA Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#041f23;
  --bg2:#093c41;
  --bg3:#0b3a53;

  --card: rgba(255,255,255,0.03);
  --line: rgba(255,255,255,0.06);

  --text:#e8fdf9;
  --muted:#7fa3a0;

  --green:#3ddc97;
  --green2:#1fa67a;

  --error:#ff6b6b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
  background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
  overflow:hidden;
}

/* fondo animado */
body::before{
  content:"";
  position:absolute;
  width:180%;
  height:180%;
  background: radial-gradient(circle, rgba(61,220,151,0.05), transparent 60%);
  animation: moveBg 14s ease-in-out infinite;
}

@keyframes moveBg{
  0%{transform:translate(-10%, -10%)}
  50%{transform:translate(10%, 10%)}
  100%{transform:translate(-10%, -10%)}
}

.card{
  position:relative;
  width:380px;
  padding:40px 30px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter: blur(16px);
  border:1px solid var(--line);
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  z-index:2;
}

.logo{
  text-align:center;
  margin-bottom:25px;
  font-weight:600;
  letter-spacing:1.5px;
  font-size:14px;
}

.logo span{
  display:block;
  font-size:22px;
  color:var(--green);
  margin-top:5px;
}

.logo-wrap{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 14px 0;
}

.logo-glow{
  position:absolute;
  width:260px;
  height:260px;
  border-radius:50%;
  background: radial-gradient(circle,
    rgba(61,220,151,0.18),
    rgba(61,220,151,0.08),
    transparent 70%);
  filter: blur(40px);
  animation: pulseGlow 4s infinite;
}

.logo-img{
  width:170px;
  z-index:2;
  position:relative;
}

@keyframes pulseGlow{
  0%{opacity:.6; transform:scale(1)}
  50%{opacity:1; transform:scale(1.08)}
  100%{opacity:.6; transform:scale(1)}
}

input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.02);
  color:white;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  margin-bottom:20px;
  color:var(--muted);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg, var(--green2), var(--green));
  font-weight:700;
  cursor:pointer;
}

.error{
  margin-top:12px;
  text-align:center;
  font-size:13px;
  color:var(--error);
}

.footer{
  text-align:center;
  font-size:11px;
  margin-top:20px;
  color:var(--muted);
}

#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="card">

<div class="logo">
  SOFTWARE DENTAL

  <div class="logo-wrap">
    <div class="logo-glow"></div>

    <img src="https://static.wixstatic.com/media/63e6ec_7fa8eb772e6a48f7a3fc89e8fa1bd426~mv2.png"
         class="logo-img">
  </div>

  <span>DENTOVA</span>
</div>

<h2>Iniciar sesión</h2>

<input id="email" type="email" placeholder="Correo electrónico">
<input id="password" type="password" placeholder="Contraseña">

<div class="row">
  <label><input type="checkbox" id="remember"> Recordar</label>
  <span id="forgot" style="cursor:pointer;">¿Olvidaste?</span>
</div>

<button id="boton-login">ENTRAR</button>

<div id="error" class="error"></div>

<div class="footer">© 2026 DENTOVA</div>

</div>

<!-- 🦷 PARTICULAS CON IMAGEN -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles=[];
let mouse={x:0,y:0};

const img = new Image();
img.src = "https://static.wixstatic.com/media/63e6ec_5374fe6f441940e09de8a9672bec9db1~mv2.png";

window.onmousemove=e=>{
  mouse.x=e.x;
  mouse.y=e.y;
};

class Particle{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*30+20;
    this.speedY=Math.random()*0.4+0.2;
  }

  update(){
    this.y-=this.speedY;
    if(this.y<0)this.y=canvas.height;

    let dx=this.x-mouse.x;
    let dy=this.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<120){
      this.x+=dx/15;
      this.y+=dy/15;
    }
  }

  draw(){
    ctx.drawImage(img, this.x, this.y, this.size, this.size);
  }
}

function init(){
  for(let i=0;i<35;i++){
    particles.push(new Particle());
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}

img.onload = () => {
  init();
  animate();
};
</script>

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

);

const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const errorDiv = document.getElementById("error");
const rememberEl = document.getElementById("remember");

/* recordar */
const savedEmail = localStorage.getItem("remember_email");
if (savedEmail) {
  emailEl.value = savedEmail;
  rememberEl.checked = true;
}

/* login */
document.getElementById("boton-login").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passEl.value.trim();
  errorDiv.textContent = "";

  if (!email || !password) {
    errorDiv.textContent = "Completa los campos.";
    return;
  }

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    errorDiv.textContent = error.message;
    return;
  }

  if (rememberEl.checked) localStorage.setItem("remember_email", email);
  else localStorage.removeItem("remember_email");

  window.location.href = "https://cacg1022.github.io/ODONTOLOGIA/index.html";
});

/* recuperar */
document.getElementById("forgot").addEventListener("click", async () => {
  const email = emailEl.value.trim();

  if (!email) {
    errorDiv.textContent = "Escribe tu correo.";
    return;
  }

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: "https://cacg1022.github.io/ODONTOLOGIA/reset.html"
  });

  if (error) {
    errorDiv.textContent = error.message;
    return;
  }

  alert("Correo enviado ✅");
});
</script>

</body>
</html>
