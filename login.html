<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTOVA Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#03141a;
  --bg2:#072c30;
  --bg3:#0a3f43;

  --card: rgba(255,255,255,0.03);
  --line: rgba(255,255,255,0.06);

  --text:#e8fdf9;
  --muted:#7fa3a0;

  --green:#3ddc97;
  --green2:#1fa67a;

  --error:#ff6b6b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);

  background: linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
  overflow:hidden;
}

/* movimiento sutil */
body::before{
  content:"";
  position:absolute;
  width:180%;
  height:180%;
  background: radial-gradient(circle, rgba(61,220,151,0.05), transparent 60%);
  animation: moveBg 14s ease-in-out infinite;
}

@keyframes moveBg{
  0%{transform:translate(-10%, -10%)}
  50%{transform:translate(10%, 10%)}
  100%{transform:translate(-10%, -10%)}
}

.card{
  position:relative;
  width:380px;
  padding:40px 30px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter: blur(16px);
  border:1px solid var(--line);
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  overflow: visible;
}

/* línea que baja */
.card::after{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--green), transparent);
  animation: scan 4s linear infinite;
}

@keyframes scan{
  0%{top:0}
  100%{top:100%}
}

.logo{
  text-align:center;
  margin-bottom:25px;
  font-weight:600;
  letter-spacing:1.5px;
  font-size:14px;
}

.logo span{
  display:block;
  font-size:22px;
  color:var(--green);
  margin-top:5px;
}

h2{
  margin:0 0 8px;
  font-weight:600;
}

p{
  margin:0 0 25px;
  font-size:13px;
  color:var(--muted);
}

.input{
  width:100%;
  margin-bottom:14px;
}

.input input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.02);
  color:white;
  outline:none;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  margin-bottom:20px;
  color:var(--muted);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg, var(--green2), var(--green));
  color:#04261f;
  font-weight:700;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

/* efecto carga botón */
button::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  animation: load 2.5s infinite;
}

@keyframes load{
  0%{left:-100%}
  100%{left:100%}
}

.error{
  margin-top:12px;
  text-align:center;
  font-size:13px;
  color:var(--error);
}

.footer{
  text-align:center;
  font-size:11px;
  margin-top:20px;
  color:var(--muted);
}


  @keyframes floatLogo{
  0%{transform:translateY(0px)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0px)}
}

@keyframes pulseGlow{
  0%{opacity:0.6; transform:translateX(-50%) scale(1)}
  50%{opacity:1; transform:translateX(-50%) scale(1.1)}
  100%{opacity:0.6; transform:translateX(-50%) scale(1)}
}
  .logo-wrap{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  margin: 14px 0 8px;
}

.logo-glow{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  width:360px;
  height:360px;
  border-radius:50%;
  background:
    background:
  radial-gradient(circle,
    rgba(61,220,151,0.55) 0%,
    rgba(61,220,151,0.35) 25%,
    rgba(61,220,151,0.18) 45%,
    rgba(61,220,151,0.08) 60%,
    transparent 75%);
  filter: blur(40px);
  z-index: 1;
  pointer-events: none;
  animation: pulseGlow 3.2s ease-in-out infinite;
}

.logo-img{
  width: 180px;
  display:block;
  position: relative;
  z-index: 2;
  filter:
    drop-shadow(0 15px 25px rgba(0,0,0,0.6))
    drop-shadow(0 0 25px rgba(61,220,151,0.35))
    drop-shadow(0 0 60px rgba(61,220,151,0.25));
  animation: floatLogo 4s ease-in-out infinite;
}
  .logo-glow{
  mix-blend-mode: screen;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
  SOFTWARE DENTAL

  <div class="logo-wrap">
    <div class="logo-glow"></div>

    <img
      src="https://static.wixstatic.com/media/63e6ec_7fa8eb772e6a48f7a3fc89e8fa1bd426~mv2.png/v1/fill/w_317,h_363,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/DENTOVA%20v3.png"
      alt="DENTOVA Logo"
      class="logo-img"
    >
  </div>
  <span>DENTOVA</span>
</div>

  <h2>Iniciar sesión</h2>
  <p>Acceso seguro al sistema clínico</p>

  <div class="input">
    <input id="email" type="email" placeholder="Correo electrónico">
  </div>

  <div class="input">
    <input id="password" type="password" placeholder="Contraseña">
  </div>

  <div class="row">
    <label><input type="checkbox" id="remember"> Recordar</label>
    <span id="forgot" style="cursor:pointer;">¿Olvidaste?</span>
  </div>

  <button id="boton-login">ENTRAR AL SISTEMA</button>

  <div id="error" class="error"></div>

  <div class="footer">© 2026 DENTOVA</div>

</div>

<!-- 🔐 SUPABASE LOGIN REAL -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dmcfrmpqlkrqbpjhrfyo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE"
);

const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const errorDiv = document.getElementById("error");
const rememberEl = document.getElementById("remember");

/* recordar correo */
const savedEmail = localStorage.getItem("remember_email");
if (savedEmail) {
  emailEl.value = savedEmail;
  rememberEl.checked = true;
}

/* LOGIN */
document.getElementById("boton-login").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passEl.value.trim();
  errorDiv.textContent = "";

  if (!email || !password) {
    errorDiv.textContent = "Por favor completa todos los campos.";
    return;
  }

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorDiv.textContent = "Error: " + error.message;
      return;
    }

    if (rememberEl.checked) localStorage.setItem("remember_email", email);
    else localStorage.removeItem("remember_email");

    localStorage.setItem("usuario_logueado", email);

    window.location.href = "https://cacg1022.github.io/ODONTOLOGIA/index.html";

  } catch (err) {
    errorDiv.textContent = "Error inesperado al conectar.";
  }
});

/* RECUPERAR PASSWORD */
document.getElementById("forgot").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  if (!email) {
    errorDiv.textContent = "Escribe tu correo primero.";
    return;
  }

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: "https://cacg1022.github.io/ODONTOLOGIA/reset.html"
  });

  if (error) {
    errorDiv.textContent = error.message;
    return;
  }

  alert("Correo de recuperación enviado ✅");
});
</script>

</body>
</html>
