<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTOVA Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#041f23;
  --bg2:#093c41;
  --bg3:#0b3a53;

  --text:#e8fdf9;
  --muted:#7fa3a0;

  --green:#3ddc97;
  --green2:#1fa67a;

  --line:rgba(255,255,255,0.08);
  --input:rgba(255,255,255,0.03);
  --error:#ff6b6b;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
}

body{
  font-family:'Inter',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(12,92,94,.18), transparent 28%),
    linear-gradient(135deg, var(--bg1), var(--bg2) 52%, var(--bg3));
}

/* halo general del fondo */
body::before{
  content:"";
  position:fixed;
  inset:-20%;
  background:
    radial-gradient(circle at 20% 70%, rgba(61,220,151,.08), transparent 20%),
    radial-gradient(circle at 80% 30%, rgba(61,220,151,.06), transparent 18%),
    radial-gradient(circle at 50% 50%, rgba(61,220,151,.04), transparent 30%);
  animation: moveBg 16s ease-in-out infinite;
  pointer-events:none;
}

@keyframes moveBg{
  0%{transform:translate(-2%, -2%) scale(1)}
  50%{transform:translate(2%, 2%) scale(1.04)}
  100%{transform:translate(-2%, -2%) scale(1)}
}

#particles{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

.card{
  position:relative;
  z-index:2;
  width:380px;
  padding:34px 30px 26px;
  border-radius:20px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
    0 26px 70px rgba(0,0,0,.48),
    inset 0 0 0 1px rgba(255,255,255,.03);
  overflow:hidden;
}

/* blobs internos como tu imagen */
.card::before,
.card::after{
  content:"";
  position:absolute;
  border-radius:50%;
  filter:blur(18px);
  pointer-events:none;
  opacity:.58;
}

.card::before{
  width:78px;
  height:78px;
  left:38px;
  top:246px;
  background:radial-gradient(circle, rgba(255,255,255,.62), rgba(255,255,255,.06) 72%, transparent 78%);
}

.card::after{
  width:86px;
  height:86px;
  right:34px;
  top:290px;
  background:radial-gradient(circle, rgba(255,255,255,.62), rgba(255,255,255,.06) 72%, transparent 78%);
}

.blob-bottom{
  position:absolute;
  width:74px;
  height:74px;
  right:18px;
  bottom:146px;
  border-radius:50%;
  filter:blur(18px);
  opacity:.42;
  pointer-events:none;
  background:radial-gradient(circle, rgba(255,255,255,.52), rgba(255,255,255,.04) 70%, transparent 78%);
}

.logo{
  text-align:center;
  margin-bottom:18px;
  position:relative;
  z-index:2;
}

.logo-top{
  font-size:14px;
  font-weight:800;
  letter-spacing:1.8px;
  color:rgba(255,255,255,.9);
  margin-bottom:16px;
}

.logo-wrap{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:12px;
}

.logo-glow{
  position:absolute;
  width:210px;
  height:210px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(61,220,151,.12), rgba(61,220,151,.04), transparent 72%);
  filter:blur(26px);
}

.logo-img{
  width:162px;
  position:relative;
  z-index:2;
  filter:drop-shadow(0 12px 20px rgba(0,0,0,.35));
}

.brand{
  display:block;
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
  color:var(--green);
  margin-top:6px;
}

h2{
  margin:18px 0 18px;
  font-size:27px;
  line-height:1.1;
  font-weight:800;
  color:#eef8f6;
}

.field{
  margin-bottom:12px;
}

.field input{
  width:100%;
  height:46px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  color:#fff;
  outline:none;
  padding:0 14px;
  font-size:14px;
  transition:border-color .2s ease, box-shadow .2s ease, background .2s ease;
}

.field input::placeholder{
  color:rgba(255,255,255,.55);
}

.field input:focus{
  border-color:rgba(61,220,151,.38);
  box-shadow:0 0 0 3px rgba(61,220,151,.08);
  background:rgba(255,255,255,.04);
}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin:8px 0 18px;
  font-size:12px;
  color:var(--muted);
}

.remember{
  display:flex;
  align-items:center;
  gap:8px;
}

.remember input{
  width:14px;
  height:14px;
  accent-color:var(--green);
}

.row span{
  cursor:pointer;
}

.row span:hover{
  color:#cfe8e3;
}

button{
  width:100%;
  height:46px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg, #26b17d, #45d98b);
  color:#04261f;
  font-size:14px;
  font-weight:800;
  letter-spacing:.4px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

button::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
  animation:shine 2.5s infinite;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 0 24px rgba(61,220,151,.18);
  filter:brightness(1.02);
}

@keyframes shine{
  0%{left:-100%}
  100%{left:100%}
}

.error{
  min-height:18px;
  margin-top:10px;
  text-align:center;
  font-size:13px;
  color:var(--error);
}

.footer{
  margin-top:16px;
  text-align:center;
  font-size:12px;
  color:rgba(255,255,255,.42);
}

/* línea vertical suave del fondo en bordes */
.side-vignette-left,
.side-vignette-right{
  position:fixed;
  top:0;
  bottom:0;
  width:110px;
  pointer-events:none;
  z-index:1;
}
.side-vignette-left{
  left:0;
  background:linear-gradient(90deg, rgba(0,0,0,.22), transparent);
}
.side-vignette-right{
  right:0;
  background:linear-gradient(270deg, rgba(0,0,0,.18), transparent);
}

@media (max-width: 460px){
  .card{
    width:calc(100vw - 28px);
    padding:30px 22px 24px;
  }
  h2{font-size:24px}
  .logo-img{width:148px}
}
</style>
</head>
<body>

<div class="side-vignette-left"></div>
<div class="side-vignette-right"></div>
<canvas id="particles"></canvas>

<div class="card">
  <div class="blob-bottom"></div>

  <div class="logo">
    <div class="logo-top">SOFTWARE DENTAL</div>

    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img
        src="https://static.wixstatic.com/media/63e6ec_7fa8eb772e6a48f7a3fc89e8fa1bd426~mv2.png"
        alt="DENTOVA"
        class="logo-img"
      >
    </div>

    <span class="brand">DENTOVA</span>
  </div>

  <h2>Iniciar sesión</h2>

  <div class="field">
    <input id="email" type="email" placeholder="Correo electrónico">
  </div>

  <div class="field">
    <input id="password" type="password" placeholder="Contraseña">
  </div>

  <div class="row">
    <label class="remember">
      <input type="checkbox" id="remember">
      <span>Recordar</span>
    </label>

    <span id="forgot">¿Olvidaste?</span>
  </div>

  <button id="boton-login">ENTRAR</button>

  <div id="error" class="error"></div>

  <div class="footer">© 2026 DENTOVA</div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];
let mouse = { x: null, y: null, radius: 120 };

window.addEventListener("mousemove", (e) => {
  mouse.x = e.x;
  mouse.y = e.y;
});

class Particle{
  constructor(){
    this.reset(true);
  }

  reset(initial = false){
    this.x = Math.random() * canvas.width;
    this.y = initial ? Math.random() * canvas.height : canvas.height + Math.random() * 30;
    //this.size = Math.random() * 1.5 + 0.3;
    this.size = Math.random() * 3 + 1;
    this.speedY = Math.random() * 0.6 + 0.2;
    this.speedX = (Math.random() - 0.5) * 0.22;
  //  this.opacity = Math.random() * 0.45 + 0.18;
    this.opacity = Math.random() * 0.7 + 0.4;
  }

  update(){
    this.y -= this.speedY;
    this.x += this.speedX;

    if (this.y < -10) this.reset(false);

    if (mouse.x !== null && mouse.y !== null) {
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < mouse.radius) {
        this.x += dx / 22;
        this.y += dy / 22;
      }
    }
  }

  draw(){
    ctx.beginPath();
    ctx.fillStyle = `rgba(61,220,151,${this.opacity})`;
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initParticles(){
  particles = [];
  for (let i = 0; i < 70; i++) {
    particles.push(new Particle());
  }
}

function animateParticles(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();

window.addEventListener("resize", () => {
  resizeCanvas();
  initParticles();
});
</script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dmcfrmpqlkrqbpjhrfyo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtY2ZybXBxbGtycWJwamhyZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzU0MDIsImV4cCI6MjA3ODUxMTQwMn0.YY_6t_lCTs5mK-a_eEdBFa6l9_NBM3B4YDtWOXayCBE"
);

const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const errorDiv = document.getElementById("error");
const rememberEl = document.getElementById("remember");
const loginBtn = document.getElementById("boton-login");
const forgotBtn = document.getElementById("forgot");

const savedEmail = localStorage.getItem("remember_email");
if (savedEmail) {
  emailEl.value = savedEmail;
  rememberEl.checked = true;
}

loginBtn.addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passEl.value.trim();
  errorDiv.textContent = "";

  if (!email || !password) {
    errorDiv.textContent = "Completa los campos.";
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "VALIDANDO...";

  try {
    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorDiv.textContent = error.message;
      loginBtn.disabled = false;
      loginBtn.textContent = "ENTRAR";
      return;
    }

    if (rememberEl.checked) localStorage.setItem("remember_email", email);
    else localStorage.removeItem("remember_email");

    window.location.href = "https://cacg1022.github.io/ODONTOLOGIA/index.html";
  } catch (err) {
    errorDiv.textContent = "Error inesperado al iniciar sesión.";
    loginBtn.disabled = false;
    loginBtn.textContent = "ENTRAR";
  }
});

forgotBtn.addEventListener("click", async () => {
  const email = emailEl.value.trim();
  errorDiv.textContent = "";

  if (!email) {
    errorDiv.textContent = "Escribe tu correo.";
    return;
  }

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: "https://cacg1022.github.io/ODONTOLOGIA/reset.html"
  });

  if (error) {
    errorDiv.textContent = error.message;
    return;
  }

  alert("Correo enviado ✅");
});
</script>

</body>
</html>
